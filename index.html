<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AQL Inspector · Inspection System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #0d0f14;
  --bg2: #161a22;
  --bg3: #1e2330;
  --surface: #242938;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f2f7;
  --muted: #8892a4;
  --accent: #ffffff;
  --accent2: #3a6fd4;
  --pass: #22c55e;
  --pass-bg: rgba(34,197,94,0.12);
  --fail: #ef4444;
  --fail-bg: rgba(239,68,68,0.12);
  --warn: #f59e0b;
  --warn-bg: rgba(245,158,11,0.12);
  --radius: 10px;
  --r-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100%;
  font-size: 14px;
  line-height: 1.5;
}
.app { display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.topbar-logo { display: flex; align-items: center; gap: 10px; }
.topbar-logo .icon {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff; font-weight: 700;
}
.topbar-logo h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
.topbar-logo span { color: var(--muted); font-weight: 400; font-size: 13px; }
.main { flex: 1; padding: 20px 16px 40px; max-width: 760px; margin: 0 auto; width: 100%; }

.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; padding: 9px 18px; border-radius: var(--r-sm);
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; border: none; transition: all 0.15s;
  text-decoration: none;
}
.btn-primary { background: var(--accent2); color: #fff; }
.btn-primary:hover { background: #2d5ab8; }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--surface); color: var(--text); }
.btn-danger { background: var(--fail-bg); color: var(--fail); border: 1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background: rgba(239,68,68,0.2); }
.btn-success { background: var(--pass-bg); color: var(--pass); border: 1px solid rgba(34,197,94,0.2); }
.btn-lg { padding: 12px 24px; font-size: 15px; border-radius: var(--radius); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
}
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-title { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.field input, .field select, .field textarea {
  width: 100%; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--r-sm); padding: 9px 12px; font-family: inherit;
  font-size: 14px; color: var(--text); outline: none;
  transition: border-color 0.15s;
}
.field select { color: #111; background: #f5f5f5; }
.field select option { color: #111; background: #fff; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent2); }
.field textarea { resize: vertical; min-height: 70px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

.steps {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 22px; overflow-x: auto;
  padding-bottom: 2px;
}
.step-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 500; color: var(--muted);
  white-space: nowrap; padding: 6px 10px 6px 0;
}
.step-item.active { color: var(--accent); }
.step-item.done { color: var(--pass); }
.step-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--surface); border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.step-item.active .step-num { background: var(--accent); border-color: var(--accent); color: #fff; }
.step-item.done .step-num { background: var(--pass-bg); border-color: var(--pass); color: var(--pass); }
.step-arrow { color: var(--border2); margin: 0 4px; font-size: 12px; }

.dash-header { margin-bottom: 24px; }
.dash-header h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
.dash-header p { color: var(--muted); font-size: 14px; margin-top: 4px; }
.report-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s;
}
.report-card:hover { border-color: var(--border2); }
.report-card .rc-left h3 { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
.report-card .rc-left p { font-size: 12px; color: var(--muted); }
.badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-pass { background: var(--pass-bg); color: var(--pass); }
.badge-fail { background: var(--fail-bg); color: var(--fail); }
.badge-draft { background: var(--warn-bg); color: var(--warn); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state .es-icon { font-size: 40px; margin-bottom: 14px; opacity: 0.4; }
.empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }

.aql-option {
  border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 14px; cursor: pointer; transition: all 0.15s;
  margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
}
.aql-option:hover { border-color: var(--border2); }
.aql-option.selected { border-color: var(--accent); background: rgba(79,142,247,0.06); }
.aql-option .ao-radio {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid var(--border2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.aql-option.selected .ao-radio { border-color: var(--accent); }
.aql-option.selected .ao-radio::after {
  content:''; width: 8px; height: 8px;
  background: var(--accent); border-radius: 50%;
}
.aql-option .ao-body h3 { font-size: 14px; font-weight: 500; }
.aql-option .ao-body p { font-size: 12px; color: var(--muted); }
.aql-summary {
  background: var(--surface); border-radius: var(--radius);
  padding: 16px; display: grid; grid-template-columns: repeat(4,1fr); gap: 12px;
  text-align: center; margin-top: 16px;
}
.aql-summary .as-item label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 4px; }
.aql-summary .as-item span { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--accent); }

.defect-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
  padding: 8px 0 6px; border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.defect-item {
  display: flex; align-items: center; padding: 8px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px; flex-wrap: wrap;
}
.defect-item:last-child { border-bottom: none; }
.defect-code { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); width: 36px; flex-shrink: 0; }
.defect-name { flex: 1; font-size: 13px; line-height: 1.3; }
.defect-name small { display: block; color: var(--muted); font-size: 11px; }
.defect-counters { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
.counter-group { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.counter-group label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-weight: 600; }
.counter-ctrl { display: flex; align-items: center; gap: 0; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r-sm); overflow: hidden; }
.counter-ctrl button {
  width: 28px; height: 28px; background: none; border: none;
  color: var(--text); font-size: 16px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: background 0.1s;
  font-family: inherit;
}
.counter-ctrl button:hover { background: var(--surface); }
.counter-ctrl span { width: 28px; text-align: center; font-size: 13px; font-family: 'DM Mono', monospace; font-weight: 500; color: var(--text); }
.counter-ctrl span.nonzero { color: var(--warn); }

.status-bar {
  position: sticky; top: 52px; z-index: 90;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 12px;
  margin: -20px -16px 20px;
}
.status-result {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
}
.status-result.pass { background: var(--pass-bg); color: var(--pass); border: 1px solid rgba(34,197,94,0.25); }
.status-result.fail { background: var(--fail-bg); color: var(--fail); border: 1px solid rgba(239,68,68,0.25); }
.status-result.pending { background: var(--warn-bg); color: var(--warn); border: 1px solid rgba(245,158,11,0.25); }
.status-counts { display: flex; gap: 10px; }
.status-counts .sc { display: flex; align-items: center; gap: 5px; font-size: 12px; }
.status-counts .sc strong { font-family: 'DM Mono', monospace; font-size: 14px; }
.status-counts .sc.ok strong { color: var(--pass); }
.status-counts .sc.ov strong { color: var(--fail); }
.status-counts .sc.warn strong { color: var(--warn); }

.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
.photo-thumb {
  aspect-ratio: 1; border-radius: var(--r-sm); overflow: hidden;
  position: relative; background: var(--surface); border: 1px solid var(--border);
  cursor: pointer;
}
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-thumb .pt-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.7); padding: 4px 6px;
  font-size: 10px; color: #fff; text-align: center;
}
.photo-thumb .pt-del {
  position: absolute; top: 4px; right: 4px;
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(0,0,0,0.7); border: none; color: #fff;
  cursor: pointer; font-size: 13px; display: flex;
  align-items: center; justify-content: center;
}
.photo-thumb .pt-edit {
  position: absolute; top: 4px; left: 4px;
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(0,0,0,0.7); border: none; color: #fff;
  cursor: pointer; font-size: 12px; display: flex;
  align-items: center; justify-content: center;
}
/* ── Camera modal — fullscreen ── */
.cam-modal {
  display:none; position:fixed; inset:0; z-index:2000;
  background:#000; flex-direction:column; overflow:hidden;
}
.cam-modal.open { display:flex; }
.cam-modal video {
  width:100%;
  flex:1;
  min-height:0;       /* critical — lets flex shrink below natural size */
  object-fit:cover;
  display:block;
}
.cam-modal canvas { display:none; }
/* ── Editor mode (crop/rotate) ── */
.cam-editor {
  display:none; position:fixed; inset:0; z-index:2001;
  background:#111; flex-direction:column; align-items:center;
}
.cam-editor.open { display:flex; }
.cam-editor-img {
  flex:1; width:100%; display:flex; align-items:center; justify-content:center;
  overflow:hidden; position:relative;
}
.cam-editor-topbar {
  width:100%; background:rgba(0,0,0,0.85); padding:10px 16px;
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.cam-editor-img canvas {
  max-width:100%; max-height:100%;
  display:block; touch-action:none; cursor:crosshair;
}
.cam-toolbar {
  width:100%; background:#1a1a1a; padding:10px 16px;
  display:flex; align-items:center; justify-content:center; gap:10px;
  flex-wrap:wrap;
}
.cam-btn {
  padding:8px 16px; border-radius:var(--r-sm); border:1.5px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.08); color:#fff; font-family:inherit;
  font-size:14px; cursor:pointer; display:flex; align-items:center; gap:6px;
  white-space:nowrap;
}
.cam-btn:active { background:rgba(255,255,255,0.18); }
.cam-btn.primary { background:var(--accent2); border-color:var(--accent2); }
.cam-btn.danger  { background:#dc2626; border-color:#dc2626; }
.cam-shutter {
  width:72px; height:72px; border-radius:50%;
  background:#fff; border:5px solid rgba(255,255,255,0.4);
  cursor:pointer; flex-shrink:0;
  transition:transform 0.1s, opacity 0.1s;
}
.cam-shutter:active { transform:scale(0.9); opacity:0.8; }
.cam-top-bar {
  width:100%; background:rgba(0,0,0,0.6); padding:10px 16px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;      /* always visible, never compressed */
  z-index:10;
}
.cam-bottom-bar {
  width:100%; background:rgba(0,0,0,0.85); padding:20px 16px;
  display:flex; align-items:center; justify-content:center; gap:24px;
  flex-shrink:0;      /* never compressed — always visible */
}
/* Crop rectangle overlay */
.crop-overlay {
  position:absolute; border:2px solid #fff;
  box-shadow:0 0 0 9999px rgba(0,0,0,0.5);
  cursor:move; touch-action:none;
}
.crop-handle {
  position:absolute; width:14px; height:14px;
  background:#fff; border:2px solid #333; border-radius:2px;
}
/* Old inline camera — keep for fallback */
.camera-preview {
  width: 100%; aspect-ratio: 4/3; background: #000;
  border-radius: var(--radius); overflow: hidden; position: relative;
  margin-bottom: 10px;
}
.camera-preview video { width: 100%; height: 100%; object-fit: cover; }
.camera-preview canvas { display: none; }
.camera-overlay {
  position: absolute; inset: 0;
  border: 2px solid rgba(79,142,247,0.4);
  border-radius: var(--radius); pointer-events: none;
}
.camera-overlay::before, .camera-overlay::after {
  content: ''; position: absolute;
  width: 20px; height: 20px; border-color: var(--accent);
  border-style: solid; border-width: 0;
}
.camera-overlay::before { top: 10px; left: 10px; border-top-width: 2px; border-left-width: 2px; }
.camera-overlay::after { bottom: 10px; right: 10px; border-bottom-width: 2px; border-right-width: 2px; }
.shutter-btn {
  width: 64px; height: 64px; border-radius: 50%;
  background: #fff; border: 4px solid var(--accent);
  cursor: pointer; margin: 0 auto; display: block;
  transition: transform 0.1s, opacity 0.1s;
}
.shutter-btn:hover { opacity: 0.9; }
.shutter-btn:active { transform: scale(0.93); }
.photo-label-select { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
.photo-label-btn {
  padding: 5px 12px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--border2); background: transparent; color: var(--muted);
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.photo-label-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.report-preview {
  background: #fff; color: #111;
  border-radius: var(--radius); padding: 0;
  overflow: hidden; font-family: 'DM Sans', sans-serif;
}
.rp-header {
  background: #dde3f0; color: #333333; padding: 16px 20px;
  display: flex; justify-content: space-between; align-items: flex-start;
}
.rp-header h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.rp-header .rp-sub { font-size: 11px; opacity: 0.7; margin-top: 3px; }
.rp-result-badge {
  padding: 6px 16px; border-radius: 4px; font-size: 14px; font-weight: 700;
  letter-spacing: 0.08em;
}
.rp-result-badge.pass { background: rgba(34,197,94,0.25); color: #22c55e; border: 1.5px solid #22c55e; }
.rp-result-badge.fail { background: rgba(239,68,68,0.25); color: #ef4444; border: 1.5px solid #ef4444; }
.rp-section { padding: 12px 20px; border-bottom: 1px solid #e5e7eb; }
.rp-section-title { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #BFBFBF; margin-bottom: 10px; }
.rp-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.rp-field label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.07em; display: block; margin-bottom: 2px; }
.rp-field span { font-size: 13px; font-weight: 500; color: #111; }
.rp-defects { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.rp-defect-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #f3f4f6; font-size: 12px; }
.rp-defect-row span:last-child { font-weight: 700; color: #A6A6A6; font-family: 'DM Mono', monospace; }
.rp-photo-grid {
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;}
.rp-photo { aspect-ratio: 1; border-radius: 4px; overflow: hidden; }
.rp-photo img { width: 100%; height: 100%; object-fit: cover; }
.rp-photo p { font-size: 10px; color: #BFBFBF; text-align: center; margin-top: 3px; }
.rp-sig-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 10px; }
.rp-sig { border-top: 1.5px solid #111; padding-top: 5px; }
.rp-sig .role { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; }
.rp-sig .name { font-size: 12px; font-weight: 500; margin-top: 2px; }
.rp-totals { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.rp-total-box { background: #f9fafb; border-radius: 6px; padding: 10px; text-align: center; }
.rp-total-box label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.07em; display: block; }
.rp-total-box span { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }
.rp-total-box span.ok { color: #22c55e; }
.rp-total-box span.ov { color: #ef4444; }

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg2); border-top: 1px solid var(--border);
  padding: 12px 16px; display: flex; gap: 10px; justify-content: space-between;
  z-index: 100;
}
.spacer { height: 80px; }

/* ══════════════════════════════════════════════
   Reusable form element classes
   Use in JS render functions instead of long
   inline style strings. Matches design tokens.
   ══════════════════════════════════════════════ */
.app-input {
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--r-sm);padding:9px 12px;font-family:inherit;
  font-size:14px;color:var(--text);outline:none;box-sizing:border-box;
}
.app-input-sm {
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--r-sm);padding:7px 9px;font-family:inherit;
  font-size:13px;color:var(--text);outline:none;box-sizing:border-box;
}
.app-select {
  width:100%;background:#f5f5f5;border:1px solid var(--border2);
  border-radius:var(--r-sm);padding:9px 12px;font-family:inherit;
  font-size:14px;color:#111;outline:none;box-sizing:border-box;
}
.app-select-sm {
  width:100%;background:#f5f5f5;border:1px solid var(--border2);
  border-radius:var(--r-sm);padding:7px 9px;font-family:inherit;
  font-size:13px;color:#111;outline:none;box-sizing:border-box;
}
.app-textarea {
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--r-sm);padding:9px 12px;font-family:inherit;
  font-size:14px;color:var(--text);outline:none;resize:vertical;min-height:72px;box-sizing:border-box;
}
.app-input[readonly],.app-input-sm[readonly]{opacity:0.65;cursor:not-allowed;}
.app-input.auto-field{opacity:0.7;cursor:default;}
.section-card{margin-bottom:12px;}
.section-title{margin-bottom:8px;}

.section-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; overflow-x: auto; }
.tab-btn {
  padding: 8px 14px; border: none; background: none; color: var(--muted);
  font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 24px; padding: 10px 20px; font-size: 13px; font-weight: 500;
  z-index: 999; animation: slideUp 0.2s ease;
  white-space: nowrap; pointer-events: none;
}
@keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(10px); } }
.divider { height: 1px; background: var(--border); margin: 14px 0; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.tag-info { background: rgba(79,142,247,0.15); color: var(--accent); }


.badge-interim { background: rgba(139,92,246,0.15); color: #a78bfa; }
.badge-count { background: var(--surface); color: var(--muted); font-size:10px; padding:2px 7px; border-radius:20px; font-weight:600; }
.order-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s;
}
.order-card:hover { border-color: var(--border2); }
.order-card .oc-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.order-card .oc-meta { display: flex; gap: 8px; flex-wrap: wrap; }

.report-type-card {
  border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 18px; cursor: pointer; transition: all 0.15s; margin-bottom: 10px;
  display: flex; gap: 14px; align-items: flex-start;
}
.report-type-card:hover { border-color: var(--border2); background: var(--surface); }
.report-type-card .rtc-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
.report-type-card .rtc-body h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.report-type-card .rtc-body p { font-size: 12px; color: var(--muted); line-height:1.5; }
.report-type-card.interim { border-color: rgba(139,92,246,0.35); }
.report-type-card.final { border-color: rgba(58,111,212,0.35); }

.interim-check-row {
  display: flex; align-items: center; padding: 10px 0;
  border-bottom: 1px solid var(--border); gap: 12px;
}
.interim-check-row:last-child { border-bottom: none; }
.check-label { flex: 1; font-size: 13px; }
.check-label small { display: block; color: var(--muted); font-size: 11px; }
.check-toggle { display: flex; gap: 6px; flex-shrink: 0; }
.check-btn { padding: 5px 14px; border-radius: var(--r-sm); font-size: 12px; font-weight: 600; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.12s; }
.check-btn.ok { background: var(--pass-bg); color: var(--pass); border-color: rgba(34,197,94,0.3); }
.check-btn.issue { background: var(--fail-bg); color: var(--fail); border-color: rgba(239,68,68,0.3); }

/* In-Line Report Print Styles */
.interim-rp-header {
  background: #d9d9d9; padding: 8px 14px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 2px solid #999;
}

</style>

<!-- ══ FULLSCREEN CAMERA MODAL ══════════════════════════════════════ -->
<div class="cam-modal" id="cam-modal">
  <div class="cam-top-bar">
    <button class="cam-btn danger" onclick="camClose()" data-i18n="cam-close">✕ Kapat</button>
    <span id="cam-label-display" style="color:#fff;font-size:14px;font-weight:600;max-width:60%;text-align:center"></span>
    <button class="cam-btn" onclick="camFlip()" data-i18n="cam-flip">🔄 Çevir</button>
  </div>
  <video id="cam-video" autoplay playsinline muted></video>
  <canvas id="cam-snap" style="display:none"></canvas>
  <div class="cam-bottom-bar">
    <label class="cam-btn" style="cursor:pointer" title="Upload from gallery">
      📁
      <input type="file" accept="image/*" multiple style="display:none" onchange="camUpload(this)">
    </label>
    <!-- Native camera: hands off to the device camera app for full sensor quality -->
    <label style="display:flex;align-items:center;justify-content:center;cursor:pointer">
      <div class="cam-shutter" title="Take photo"></div>
      <input type="file" accept="image/*" capture="environment" style="display:none" onchange="camNativeSnap(this)">
    </label>
    <div style="width:60px"></div>
  </div>
</div>

<!-- ══ PHOTO EDITOR MODAL (crop + rotate) ═══════════════════════════ -->
<div class="cam-editor" id="cam-editor">

    <button class="cam-btn primary" onclick="editorSave()" data-i18n="ed-save">✓ Kullan</button>
  </div>
  <div class="cam-editor-img" id="cam-editor-img">

    <div class="crop-overlay" id="crop-overlay" style="display:none">
      <div class="crop-handle" style="top:-7px;left:-7px;cursor:nw-resize" data-handle="tl"></div>
      <div class="crop-handle" style="top:-7px;right:-7px;cursor:ne-resize" data-handle="tr"></div>
      <div class="crop-handle" style="bottom:-7px;left:-7px;cursor:sw-resize" data-handle="bl"></div>
      <div class="crop-handle" style="bottom:-7px;right:-7px;cursor:se-resize" data-handle="br"></div>
    </div>
  </div>
  <div class="cam-toolbar">
    <button class="cam-btn" onclick="editorRotate(-90)" data-i18n="ed-rotL">↺ Sol</button>
    <button class="cam-btn" onclick="editorRotate(90)"  data-i18n="ed-rotR">↻ Sağ</button>
    <button class="cam-btn" onclick="editorFlipH()"     data-i18n="ed-flipH">↔ Yatay</button>
    <button class="cam-btn" onclick="editorFlipV()"     data-i18n="ed-flipV">↕ Dikey</button>
    <button class="cam-btn" onclick="editorToggleCrop()" id="crop-toggle-btn" data-i18n="ed-crop">✂ Kırp</button>
    <button class="cam-btn" onclick="editorReset()"     data-i18n="ed-reset">↺ Sıfırla</button>
  </div>
</div>

<div id="action-sheet" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:3001;background:var(--bg2);border-top:1px solid var(--border2);border-radius:16px 16px 0 0;padding:20px 20px 32px;max-width:480px;margin:0 auto">

  <button id="action-edit-btn" onclick="actionSheetEdit()" style="width:100%;display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);font-family:inherit;font-size:15px;font-weight:500;color:var(--text);cursor:pointer;margin-bottom:10px;text-align:left">
    <span style="font-size:20px">✏️</span>
    <div>

      <div class="as-sub" style="font-size:12px;color:var(--muted);margin-top:2px">Open and modify this report</div>
    </div>
  </button>
  <button id="action-download-btn" onclick="actionSheetDownload()" style="width:100%;display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);font-family:inherit;font-size:15px;font-weight:500;color:var(--text);cursor:pointer;margin-bottom:10px;text-align:left">
    <span style="font-size:20px">📄</span>
    <div>
      <div class="as-main" style="font-size:14px;font-weight:600">Download PDF</div>
      <div class="as-sub" style="font-size:12px;color:var(--muted);margin-top:2px">Export this report as a PDF file</div>
    </div>
  </button>
  <button id="action-cancel-btn" onclick="closeActionSheet()" style="width:100%;padding:12px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:14px;color:var(--muted);cursor:pointer;margin-top:2px">Cancel</button>
</div>

<script>
// ╔══════════════════════════════════════════════════════════════════════╗
// ║  AQL INSPECTION SYSTEM — single-file app                            ║
// ║  Search guide: before editing any feature, search these terms first  ║
// ╠══════════════════════════════════════════════════════════════════════╣
// ║  Photos      → photos, addPhoto, deletePhoto, compressImage         ║
// ║  Camera      → cameraStream, startCamera, stopCamera, getUserMedia  ║
// ║  PDF/Print   → buildPrintHTML, buildInterimReportHTML,              ║
// ║                buildChecklistPDF, _triggerPDFDownload               ║
// ║  Supabase    → sb.rest, persistReports, saveInterimReports,         ║
// ║                saveChecklists, reportToRow, rowToReport             ║
// ║  People      → loadPeople, savePeople, loadPeopleDefaults,          ║
// ║                showManagePeople, peopleOpts                         ║

// Every mutation of reports goes through here — storage is automatic

  fn(state.reports);

}

// Every mutation of currentReport goes through here
/**
 * Atomic report mutation: applies fn to currentReport, then auto-persists.
 * @param {function} fn - Mutator function receiving the report object
 */
function updateReport(fn) {
  if (!state.currentReport) return;
  fn(state.currentReport);
  // Sync back into the reports array
  const idx = state.reports.findIndex(r => r.id === state.currentReport.id);
  if (idx >= 0) state.reports[idx] = state.currentReport;
  persistReports();
}

/** Saves reports to localStorage and syncs to Supabase. Oldest reports are
 * pruned when storage is full. Call after every report mutation.
 * Photos are uploaded to the storage bucket first — only URLs are stored
 * in localStorage and the DB, never raw base64. */
async function persistReports() {
  // ── Upload any pending base64 photos to bucket first ──────────────
  // This replaces base64 data URIs with bucket URLs IN STATE before
  // writing to localStorage, so localStorage never stores raw base64.
  if (typeof sb !== 'undefined') {
    for (const r of state.reports) {
      try { await uploadPendingPhotos(r); } catch(e) {
        console.warn('[AQL] Photo upload failed, keeping base64 for now:', e.message);
      }
    }
  }

  // ── Write to localStorage (photos are now URLs, not base64) ───────
  const sorted = [...state.reports].sort((a, b) => {
    const da = a.savedAt || a.date || '';
    const db = b.savedAt || b.date || '';
    return da < db ? -1 : da > db ? 1 : 0;
  });

  try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
  let attempts = 0;
  while (sorted.length > 0) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sorted));
      if (attempts > 0) {
        state.reports = sorted;
        toast(`⚠️ ${t('Storage full — oldest reports removed to make space. Download PDFs to keep them.')}`, 6000);
      }
      break;
    } catch (e) {
      sorted.shift();
      attempts++;
    }
  }
  if (sorted.length === 0 && attempts > 0) {
    toast(t('⚠️ Storage critically full. Please export reports as PDF and clear storage.'), 8000);
  }

  // ── Sync to Supabase DB (photos already uploaded, rows contain only URLs) ──
  if (typeof sb !== 'undefined') {
    for (const r of state.reports) {
      try {
        const row = reportToRow(r);
        await sb.rest('POST', 'reports', row, { on_conflict: 'id' });
        console.log('[AQL] ✅ Synced report:', r.id);
      } catch (e) {
        console.error('[AQL] ❌ Failed to sync report', r.id, e.message);
      }
    }
  }
}


(function loadReports() {
  try {

    if (raw) state.reports = JSON.parse(raw);
  } catch (e) {

  }
})();

// Download a full .json backup to device
// ──────────────────────────────────────────────
// JSON IMPORT / EXPORT (backup/restore)
// ──────────────────────────────────────────────
function saveReportToFile(r) {
  const brand    = (r.customer || 'Brand').replace(/[^a-zA-Z0-9]/g, '_');
  const po       = (r.orderno  || 'PO'   ).replace(/[^a-zA-Z0-9]/g, '_');
  const blob = new Blob([JSON.stringify(r, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `${brand}_${po}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// Import .json files back in
function importReports(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  let pending = files.length;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const r = JSON.parse(e.target.result);
        if (!r.id) throw new Error('invalid');
        updateReports(reports => {
          const idx = reports.findIndex(x => x.id === r.id);
          if (idx >= 0) reports[idx] = r; else reports.push(r);
        });
      } catch (_) {
        toast(`⚠️ ${t('Could not read file:')} ${file.name}`);
      }
      if (--pending === 0) { showDashboard(); toast(`✓ ${files.length} ${t('report')}${files.length > 1 ? ' ' : ' '}${t('imported')}`); }
    };
    reader.onerror = () => { toast(`⚠️ ${t('Failed to read file:')} ${file.name}`); --pending; };
    reader.readAsText(file);
  });
}

/**
 * Returns AQL sample size and accept/reject limits for a given lot size and level.
 * @param {number} qty   - Order quantity
 * @param {string} level - AQL level: "1.0" | "1.5" | "2.5" | "4.0"
 * @returns {{ sampleQty:number, major:number, minor:number, critical:number }}
 */
function getAQLLimits(qty, level) {
  const table = AQL_TABLES[level] || AQL_TABLES['2.5'];
  const keys  = Object.keys(table).map(Number).sort((a, b) => a - b);
  // Pick the highest threshold that is still <= qty (bracket logic: 281 <= 500 < 501)
  let key = keys[0];
  for (let i = 0; i < keys.length; i++) {
    if (keys[i] <= qty) key = keys[i];
  }
  const [sampleQty, critical, major, minor] = table[key];
  return { sampleQty, critical, major, minor };
}

/**
 * Sums all defect counts across categories for a report.
 * @param {Object} r - Report object
 * @returns {{ maj:number, min:number, crit:number }}
 */
function defectTotals(report) {
  let maj = 0, min = 0, crit = 0;
  Object.values(report.defects || {}).forEach(d => { maj += d.maj || 0; min += d.min || 0; crit += d.crit || 0; });
  return { maj, min, crit };
}

/**
 * Determines pass/fail based on defect counts vs AQL limits.
 * @param {Object} r - Report object (must have majorLimit, minorLimit, criticalLimit)
 * @returns {"pass"|"fail"|"pending"}
 */
function autoResult(report) {
  const { maj, min, crit } = defectTotals(report);
  if (crit > 0) return 'fail';
  return (maj > report.majorLimit || min > report.minorLimit) ? 'fail' : 'pass';
}

/**
 * Opens the fullscreen camera modal.
 * @param {function(string):void} onSave - Callback receiving compressed base64 URL
 * @param {string} [labelText]            - Display label shown in camera top bar
 */
async function camOpen(onSave, labelText) {
  camState.onSave = onSave;
  camState.label  = labelText || '';
  const modal = document.getElementById('cam-modal');
  const lbl   = document.getElementById('cam-label-display');
  if (lbl) lbl.textContent = labelText || '';
  modal.classList.add('open');
  await camStartStream();
}

async function camStartStream() {
  if (camState.stream) { camState.stream.getTracks().forEach(t => t.stop()); camState.stream = null; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: camState.facingMode,
        width:  { ideal: 4096 },
        height: { ideal: 3072 },
        frameRate: { ideal: 30 },
        resizeMode: 'none',         // don't let browser downscale
      },
      audio: false
    });
    camState.stream = stream;
    const video = document.getElementById('cam-video');
    if (video) { video.srcObject = stream; video.play(); }
  } catch(e) {
    document.getElementById('cam-modal').classList.remove('open');
    toast(t('Camera not available.'));
  }
}

function camClose() {
  if (camState.stream) { camState.stream.getTracks().forEach(t => t.stop()); camState.stream = null; }
  const video = document.getElementById('cam-video');
  if (video) { video.pause(); video.srcObject = null; }
  document.getElementById('cam-modal').classList.remove('open');
}

async function camFlip() {
  camState.facingMode = camState.facingMode === 'environment' ? 'user' : 'environment';
  await camStartStream();
}

async function camSnap() {
  const video = document.getElementById('cam-video');
  const canvas = document.getElementById('cam-snap');
  if (!video || !canvas) return;

  const track = camState.stream && camState.stream.getVideoTracks()[0];

  // ImageCapture grabs a true still from the sensor — much sharper than drawImage(video)
  if (track && typeof ImageCapture !== 'undefined') {
    try {
      const imageCapture = new ImageCapture(track);
      const capabilities = imageCapture.getPhotoCapabilities ? await imageCapture.getPhotoCapabilities().catch(() => null) : null;
      const photoSettings = {};
      if (capabilities?.imageWidth?.max)  photoSettings.imageWidth  = capabilities.imageWidth.max;
      if (capabilities?.imageHeight?.max) photoSettings.imageHeight = capabilities.imageHeight.max;
      const blob = await imageCapture.takePhoto(photoSettings);
      const url = await new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(blob);
      });
      camClose();
      editorOpen(url);
      return;
    } catch(e) {
      console.warn('[AQL] ImageCapture failed, falling back to canvas:', e);
    }
  }

  // Fallback: draw from video element
  const settings = track ? track.getSettings() : {};
  const w = settings.width  || video.videoWidth  || 1280;
  const h = settings.height || video.videoHeight || 720;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(video, 0, 0, w, h);
  const url = canvas.toDataURL('image/jpeg', 1.0);
  camClose();
  editorOpen(url);
}

async function camNativeSnap(input) {
  const file = input.files[0];
  if (!file) return;
  camClose();
  const reader = new FileReader();
  reader.onload = e => editorOpen(e.target.result);
  reader.readAsDataURL(file);
  // Reset input so same file can be re-selected
  input.value = '';
}

async function camUpload(input) {
  camClose();
  const files = Array.from(input.files);
  for (const file of files) {
    await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => { editorOpen(e.target.result, resolve); };
      reader.readAsDataURL(file);
    });
  }
}

// ── Photo editor ─────────────────────────────────────────────────────
/**
 * Opens the photo editor modal for a given image.
 * Supports rotate, flip, and crop before saving.
 * @param {string} dataURL - Base64 image source
 */
function editorOpen(dataURL, onDone) {
  camState.rotation   = 0;
  camState.flipH      = false;
  camState.flipV      = false;
  camState.cropActive = false;
  camState.cropRect   = null;
  camState.dragState  = null;
  camState.originalDataURL = dataURL;   // always preserve the untouched original
  camState._snapJustFired  = false;
  const btn = document.getElementById('crop-toggle-btn');
  if (btn) btn.style.background = '';

  const img = new Image();
  img.onload = () => {
    camState.srcImage = img;
    document.getElementById('cam-editor').classList.add('open');
    editorDraw();
    editorSetupCropDrag();
  };
  img.src = dataURL;
}

function editorDraw() {
  const canvas = document.getElementById('editor-canvas');
  if (!canvas || !camState.srcImage) return;
  const img = camState.srcImage;
  const rot = ((camState.rotation % 360) + 360) % 360;
  const swapped = rot === 90 || rot === 270;
  const srcW = img.naturalWidth, srcH = img.naturalHeight;
  const drawW = swapped ? srcH : srcW;
  const drawH = swapped ? srcW : srcH;

  // Fit to container
  const container = document.getElementById('cam-editor-img');
  const maxW = container.clientWidth  || window.innerWidth;
  const maxH = container.clientHeight || (window.innerHeight - 160);
  const scale = Math.min(maxW / drawW, maxH / drawH, 1);
  canvas.width  = Math.round(drawW * scale);
  canvas.height = Math.round(drawH * scale);
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';

  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.rotate(rot * Math.PI / 180);
  if (camState.flipH) ctx.scale(-1, 1);
  if (camState.flipV) ctx.scale(1, -1);
  ctx.drawImage(img, -drawW * scale / 2, -drawH * scale / 2, drawW * scale, drawH * scale);
  ctx.restore();

  // Draw crop overlay
  const overlay = document.getElementById('crop-overlay');
  if (camState.cropActive && camState.cropRect) {
    const r = camState.cropRect;
    const cRect = canvas.getBoundingClientRect();
    const edRect = document.getElementById('cam-editor-img').getBoundingClientRect();
    overlay.style.display = 'block';
    overlay.style.left   = (cRect.left - edRect.left + r.x) + 'px';
    overlay.style.top    = (cRect.top  - edRect.top  + r.y) + 'px';
    overlay.style.width  = r.w + 'px';
    overlay.style.height = r.h + 'px';
  } else {
    overlay.style.display = 'none';
  }
}

function editorRotate(deg) {
  camState.rotation = (camState.rotation + deg + 360) % 360;
  camState.cropRect = null;
  editorDraw();
}

function editorFlipH() { camState.flipH = !camState.flipH; editorDraw(); }
function editorFlipV() { camState.flipV = !camState.flipV; editorDraw(); }

function editorReset() {
  camState.rotation = 0; camState.flipH = false; camState.flipV = false;
  camState.cropActive = false; camState.cropRect = null;
  const btn = document.getElementById('crop-toggle-btn');
  if (btn) btn.style.background = '';
  editorDraw();
}

function editorToggleCrop() {
  camState.cropActive = !camState.cropActive;
  const btn = document.getElementById('crop-toggle-btn');
  if (btn) btn.style.background = camState.cropActive ? 'var(--accent2)' : '';
  if (camState.cropActive && !camState.cropRect) {
    const canvas = document.getElementById('editor-canvas');
    const p = 20;
    camState.cropRect = { x: p, y: p, w: canvas.width - p*2, h: canvas.height - p*2 };
  }
  if (!camState.cropActive) camState.cropRect = null;
  editorDraw();
}

function editorSetupCropDrag() {
  const overlay = document.getElementById('crop-overlay');
  const edArea  = document.getElementById('cam-editor-img');
  if (!overlay || !edArea) return;

  function getPos(e) {
    const touch = e.touches ? e.touches[0] : e;
    const rect = edArea.getBoundingClientRect();
    const canRect = document.getElementById('editor-canvas').getBoundingClientRect();
    return {
      x: touch.clientX - canRect.left,
      y: touch.clientY - canRect.top
    };
  }

  function onStart(e) {
    if (!camState.cropActive || !camState.cropRect) return;
    const handle = e.target.dataset?.handle;
    const pos = getPos(e);
    camState.dragState = { handle: handle || 'move', startPos: pos, startRect: { ...camState.cropRect } };
    e.preventDefault();
  }

  function onMove(e) {
    if (!camState.dragState || !camState.cropRect) return;
    const pos = getPos(e);
    const dx = pos.x - camState.dragState.startPos.x;
    const dy = pos.y - camState.dragState.startPos.y;
    const sr = camState.dragState.startRect;
    const canvas = document.getElementById('editor-canvas');
    const cw = canvas.width, ch = canvas.height;
    let { x, y, w, h } = sr;

    if (camState.dragState.handle === 'move') {
      x = Math.max(0, Math.min(cw - w, sr.x + dx));
      y = Math.max(0, Math.min(ch - h, sr.y + dy));
    } else {
      if (camState.dragState.handle.includes('r')) { w = Math.max(40, Math.min(cw - x, sr.w + dx)); }
      if (camState.dragState.handle.includes('l')) { const nx = Math.max(0, Math.min(sr.x + sr.w - 40, sr.x + dx)); w = sr.x + sr.w - nx; x = nx; }
      if (camState.dragState.handle.includes('b')) { h = Math.max(40, Math.min(ch - y, sr.h + dy)); }
      if (camState.dragState.handle.includes('t')) { const ny = Math.max(0, Math.min(sr.y + sr.h - 40, sr.y + dy)); h = sr.y + sr.h - ny; y = ny; }
    }
    camState.cropRect = { x, y, w, h };
    editorDraw();
    e.preventDefault();
  }

  function onEnd() { camState.dragState = null; }

  overlay.addEventListener('mousedown', onStart);
  overlay.addEventListener('touchstart', onStart, { passive: false });
  edArea.addEventListener('mousemove', onMove);
  edArea.addEventListener('touchmove', onMove, { passive: false });
  edArea.addEventListener('mouseup', onEnd);
  edArea.addEventListener('touchend', onEnd);

  // Handle click on handles
  overlay.querySelectorAll('.crop-handle').forEach(h => {
    h.addEventListener('mousedown', onStart);
    h.addEventListener('touchstart', onStart, { passive: false });
  });
}

/**
 * Applies all edits at full resolution. Encodes based on photo label:
 * - Barcode or Trim labels → lossless JPEG (quality 1.0), never compress
 * - Everything else with edits → WebP 80% (~50% smaller, visually fine for garment shots)
 * - No edits at all → original bytes returned untouched
 */
async function editorSave() {
  if (!camState.srcImage) return;

  const noEdits = camState.rotation === 0 && !camState.flipH && !camState.flipV && !camState.cropActive;

  // Helper: should this label be kept lossless?
  function isProtectedLabel(label) {
    if (!label) return false;
    const l = label.toLowerCase();
    return l.includes('barcode') || l.includes('barkod') || l.includes('trim') || l.includes('aksesuar');
  }
  const protected_ = isProtectedLabel(camState.label);

  // No edits — return the original untouched regardless of label.
  if (noEdits && camState.originalDataURL) {
    document.getElementById('cam-editor').classList.remove('open');
    if (typeof camState.onSave === 'function') camState.onSave(camState.originalDataURL);
    return;
  }

  // Edits applied — render at full native resolution
  const img = camState.srcImage;
  const rot = ((camState.rotation % 360) + 360) % 360;
  const swapped = rot === 90 || rot === 270;
  const fullW = swapped ? img.naturalHeight : img.naturalWidth;
  const fullH = swapped ? img.naturalWidth  : img.naturalHeight;

  const full = document.createElement('canvas');
  full.width = fullW; full.height = fullH;
  const ctx = full.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.save();
  ctx.translate(fullW / 2, fullH / 2);
  ctx.rotate(rot * Math.PI / 180);
  if (camState.flipH) ctx.scale(-1, 1);
  if (camState.flipV) ctx.scale(1, -1);
  ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2, img.naturalWidth, img.naturalHeight);
  ctx.restore();

  let result = full;

  if (camState.cropActive && camState.cropRect) {
    const r = camState.cropRect;
    const srcCanvas = document.getElementById('editor-canvas');
    const scale = fullW / srcCanvas.width;
    const cx = Math.round(r.x * scale), cy = Math.round(r.y * scale);
    const cw = Math.round(r.w * scale), ch = Math.round(r.h * scale);
    const cropped = document.createElement('canvas');
    cropped.width = cw; cropped.height = ch;
    const croppedCtx = cropped.getContext('2d');
    croppedCtx.imageSmoothingEnabled = true;
    croppedCtx.imageSmoothingQuality = 'high';
    croppedCtx.drawImage(full, cx, cy, cw, ch, 0, 0, cw, ch);
    result = cropped;
  }

  document.getElementById('cam-editor').classList.remove('open');

  // Encode: protected labels → lossless JPEG, everything else → WebP 80%
  const finalUrl = protected_
    ? result.toDataURL('image/jpeg', 1.0)
    : result.toDataURL('image/webp', 0.80);

  if (typeof camState.onSave === 'function') camState.onSave(finalUrl);
}

function editorDiscard() {
  document.getElementById('cam-editor').classList.remove('open');
  camState.srcImage = null;
  // Re-open camera if it was a camera shot (not upload)
}

const qs     = sel => document.querySelector(sel);
const render = html => qs('#main-content').innerHTML = html;

/**
 * Escapes a value for safe injection into HTML attribute or text context.
 * Prevents layout breakage when customer names, style numbers, or labels
 * contain quotes, angle brackets, or ampersands.
 * @param {*} v - Any value (coerced to string)
 * @returns {string} HTML-escaped string
 */
const esc = v => String(v == null ? '' : v)
  .replace(/&/g, '&amp;')
  .replace(/</g, '&lt;')
  .replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;')
  .replace(/'/g, '&#39;');

/**
 * Shows a transient notification at the bottom of the screen.
 * @param {string} msg     - Message text
 * @param {number} [dur]   - Duration in ms (default TOAST_DURATION)
 */
function toast(msg, dur = TOAST_DURATION) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur);
}

function formatDT(val) {
  if (!val) return '—';
  const d = new Date(val);
  if (isNaN(d)) return val;
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function localNowString() {
  const now = new Date(), p = n => String(n).padStart(2, '0');
  return `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())}T${p(now.getHours())}:${p(now.getMinutes())}`;
}

function formatShipDate(input) {
  let v = input.value.replace(/\D/g, '');
  if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
  if (v.length > 5) v = v.slice(0,5) + '/' + v.slice(5);
  input.value = v.slice(0,10);
}

function buildDefectRowsForCats(catIds, r, mode) {
  // mode: 'preview' → div-based; 'print' → table-row based
  let out = '';
  catIds.forEach(catId => {
    const cat = DEFECT_CATEGORIES.find(c => c.id === catId);

    if (mode === 'preview') {
      out += `<div style="font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:#dde3f0;padding:4px 8px;margin-top:6px">${cat.label} · ${cat.sub}</div>`;
      cat.items.forEach(item => {
        const d   = r.defects[item.code] || {maj:0,min:0};
        const hi  = (d.maj>0||d.min>0) ? '#fee2e2' : 'transparent';
        out += `<div style="display:flex;padding:3px 8px;border-bottom:1px solid #f0f0f0;background:${hi};break-inside:avoid">
          <span style="width:34px;font-size:10px;font-family:monospace">${item.code}</span>
          <span style="flex:1;font-size:11px">${item.en}<br><span style="color:#9ca3af;font-size:10px">${item.tr}</span></span>
          <span style="width:36px;text-align:center;font-weight:700;color:${d.maj?'#ef4444':'#ccc'}">${d.maj||'—'}</span>
          <span style="width:36px;text-align:center;font-weight:700;color:${d.min?'#ef4444':'#ccc'}">${d.min||'—'}</span>
        </div>`;
      });
    } else {
      out += `<tr><td colspan="4" style="background:#a6a6a6;font-weight:800;font-size:8.5px;padding:2px 4px;text-transform:uppercase;border:1px solid #bbb">${cat.label} · ${cat.sub}</td></tr>`;
      cat.items.forEach(item => {
        const d    = r.defects[item.code] || {maj:0,min:0};
        const hasDef = d.maj>0||d.min>0;
        out += `<tr style="${hasDef?'background:#fee2e2':''}">
          <td style="font-size:8px;font-family:monospace;padding:1px 3px;color:#A6A6A6;white-space:nowrap;border:1px solid #ccc">${item.code}</td>
          <td style="font-size:7.5px;padding:1px 3px;border:1px solid #ccc;line-height:1.2">${item.en}<br><span style="color:#888;font-size:7px">${item.tr}</span></td>
          <td style="text-align:center;font-size:9px;font-weight:700;color:${d.maj>0?'#ef4444':'#ccc'};border:1px solid #ccc">${d.maj>0?d.maj:''}</td>
          <td style="text-align:center;font-size:9px;font-weight:700;color:${d.min>0?'#ef4444':'#ccc'};border:1px solid #ccc">${d.min>0?d.min:''}</td>
        </tr>`;
      });
    }
  });
  return out;
}

function getStorageInfo() {
  let used = 0;
  for (let k in localStorage) {
    if (localStorage.hasOwnProperty(k)) {
      try { used += (localStorage.getItem(k) || '').length * 2; } catch(_) {}
    }
  }
  const usedKB = Math.round(used / 1024);
  const pct = Math.min(100, Math.round(used / (5 * 1024 * 1024) * 100));
  return { usedKB, pct };
}

function clearAllStorage() {
  if (!confirm(t('Clear ALL storage?\n\nThis will delete all saved reports and data. Make sure you have exported any reports you need as PDF first.'))) return;
  // Only remove reports — people, customers and defaults are preserved
  try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
  try { localStorage.removeItem(INTERIM_KEY); } catch (_) {}

/**
 * Renders the main dashboard: order list with search/filter and brand badges.
 * Also serves as the "go home" navigation target from all other screens.
 */
/**
 * Derives a grouped, sorted order list from state.reports and state.interimReports.
 * Pure function — reads state but does not mutate it.
 * @returns {Array} Orders sorted by most recent activity descending
 */
function getOrders() {
  const orderMap = {};
  state.reports.forEach(r => {
    const key = (r.customer||'') + '||' + (r.orderno||'');
    if (!orderMap[key]) orderMap[key] = { customer: r.customer, orderno: r.orderno, finals: [], interims: [], lastDate: '' };
    orderMap[key].finals.push(r);
    const d = r.createdAt || r.savedAt || '';
    if (d > orderMap[key].lastDate) orderMap[key].lastDate = d;
  });
  state.interimReports.forEach(ir => {
    const key = (ir.customer||'') + '||' + (ir.orderno||'');
    if (!orderMap[key]) orderMap[key] = { customer: ir.customer, orderno: ir.orderno, finals: [], interims: [], lastDate: '' };
    orderMap[key].interims.push(ir);
    const d = ir.createdAt || '';
    if (d > orderMap[key].lastDate) orderMap[key].lastDate = d;
  });
  return Object.values(orderMap).sort((a, b) => b.lastDate < a.lastDate ? -1 : b.lastDate > a.lastDate ? 1 : 0);
}

/**
 * Filters the dashboard order list by PO number search and brand dropdown.
 * Reads directly from DOM inputs — called on every keypress/change.
 */
function filterOrders() {
  const po    = (qs('#search-po')?.value || '').toLowerCase().trim();
  const brand = (qs('#filter-brand')?.value || '').toLowerCase().trim();
  const allOrders = getOrders();
  const orders = allOrders.filter(o => {
    if (po && !(o.orderno||'').toLowerCase().includes(po) && !(o.customer||'').toLowerCase().includes(po)) return false;
    if (brand && (o.customer||'').toLowerCase() !== brand) return false;
    return true;
  });
  const list = qs('#order-list');
  if (!list) return;
  if (!allOrders.length) {
    list.innerHTML = `<div class="empty-state"><div class="es-icon">📋</div><h3>${t('No inspections yet')}</h3><p>${t('Start your first inspection report')}</p></div>`;
    return;
  }
  if (!orders.length) {
    list.innerHTML = `<div class="empty-state"><div class="es-icon">🔍</div><h3>${t('No results found')}</h3><p>${t('Try adjusting your search')}</p></div>`;
    return;
  }
  list.innerHTML = orders.map(o => {
    const fi = o.finals.length, ii = o.interims.length;
    const ci = (state.checklists||[]).filter(c => c.customer === o.customer && c.orderno === o.orderno).length;
    const lastFinal = o.finals.slice(-1)[0];
    const overallResult = lastFinal ? lastFinal.result : null;
    const resultBadge = overallResult === 'pass'
      ? `<span class="badge badge-pass">${t('PASSED')}</span>`
      : overallResult === 'fail'
        ? `<span class="badge badge-fail">${t('FAILED')}</span>`
        : '';
    return `<div class="order-card" onclick="openOrderHub('${encodeURIComponent(o.customer||'')}','${encodeURIComponent(o.orderno||'')}')">
      <div>
        <div class="oc-title">${o.customer||'—'} &nbsp;·&nbsp; ${o.orderno||'—'}</div>
        <div class="oc-meta" style="margin-top:5px">
          ${ii > 0 ? `<span class="badge badge-interim">⚡ ${ii} ${uiLang==='tr'?'Ara Kontrol':'In-Line'}</span>` : ''}
          ${fi > 0 ? `<span class="badge" style="background:rgba(58,111,212,0.12);color:var(--accent2)">📋 ${fi} Final</span>` : ''}
          ${ci > 0 ? `<span class="badge" style="background:rgba(34,197,94,0.12);color:var(--pass)">✅ ${ci} ${uiLang==='tr'?'Kontrol Listesi':'Checklist'}</span>` : ''}
          ${resultBadge}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteOrder('${encodeURIComponent(o.customer||'')}','${encodeURIComponent(o.orderno||'')}')">${t('Delete')}</button>
        <span style="color:var(--muted);font-size:20px">›</span>
      </div>
    </div>`;
  }).join('');
}

/**
 * Permanently deletes ALL reports (final, in-line, checklist) for an order.
 * Removes from localStorage, state, and Supabase.
 * @param {string} customerEnc - URI-encoded customer name
 * @param {string} ordernoEnc  - URI-encoded order number
 */
async function deleteOrder(customerEnc, ordernoEnc) {
  const customer = decodeURIComponent(customerEnc);
  const orderno  = decodeURIComponent(ordernoEnc);
  if (!confirm(`${t('Delete ALL reports for')} ${customer} · ${orderno}?\n\n${uiLang==='tr'?'Bu siparişe ait tüm ara kontrol ve final raporları kalıcı olarak silinecek. Önce PDF olarak kaydettiğinizden emin olun.':'This will permanently remove all interim and final reports for this order. Make sure you have saved PDFs first.'}`)) return;
  // Remove final reports
  const toDelete = state.reports.filter(r => r.customer === customer && r.orderno === orderno);
  state.reports = state.reports.filter(r => !(r.customer === customer && r.orderno === orderno));
  persistReports().catch(e => console.warn('[AQL] persistReports failed:', e.message));
  // Remove interim reports
  const interimToDelete = state.interimReports.filter(r => r.customer === customer && r.orderno === orderno);
  state.interimReports = state.interimReports.filter(r => !(r.customer === customer && r.orderno === orderno));
  saveInterimReports().catch(e => console.warn("[AQL] saveInterimReports failed:", e.message));
  // Remove checklists
  const checklistsToDelete = state.checklists.filter(c => c.customer === customer && c.orderno === orderno);
  state.checklists = state.checklists.filter(c => !(c.customer === customer && c.orderno === orderno));
  saveChecklists().catch(e => console.warn("[AQL] saveChecklists failed:", e.message));
  // Delete all from Supabase
  if (typeof sb !== 'undefined') {
    for (const r of toDelete) {
      try { await sb.rest('DELETE', 'reports', null, { id: `eq.${r.id}` }); } catch(e) { console.warn('[AQL] Delete report failed:', e.message); }
    }
    for (const ir of interimToDelete) {
      try { await sb.rest('DELETE', 'interim_reports', null, { id: `eq.${ir.id}` }); } catch(e) { console.warn('[AQL] Delete interim failed:', e.message); }
    }
    for (const cl of checklistsToDelete) {
      try { await sb.rest('DELETE', 'checklists', null, { id: `eq.${cl.id}` }); } catch(e) { console.warn('[AQL] Delete checklist failed:', e.message); }
    }
  }
  toast(`${uiLang==='tr'?'Sipariş silindi':'Order deleted'}: ${customer} · ${orderno}`);
  showDashboard();
}

function _getNewOrderFields() {
  const customer = qs('#no-customer')?.value || '';

  if (!customer || !orderno) { toast(t('Please fill in Customer and Order No')); return null; }
  // Check for duplicate order
  const exists = state.reports.find(r => r.customer === customer && r.orderno === orderno)
              || state.interimReports.find(r => r.customer === customer && r.orderno === orderno)
              || state.checklists.find(c => c.customer === customer && c.orderno === orderno);

    const msg = uiLang === 'tr'
      ? `${customer} · ${orderno} için zaten bir sipariş mevcut.\n\nMevcut siparişi açmak istiyor musunuz?`

// CHECKLIST — create / edit / delete
// ──────────────────────────────────────────────
function newChecklist(customer, orderno) {
  const now = new Date();
  const p = n => String(n).padStart(2,'0');
  const items = {};
  CHECKLIST_SECTIONS.forEach(sec => sec.items.forEach(item => {
    items[item.id] = { result: null, comments: '', checkedBy: '', date: '' };
  }));
  const signoffs = {};
  CHECKLIST_SIGNOFF_ROLES.forEach(r => {
    signoffs[r.id] = { name: '', date: '', signed: false };
  });
  return {
    id: 'CHL-' + Date.now(),
    createdAt: now.toISOString(),
    customer, orderno,
    header: { customer: customer, poNo: orderno, styleName: '', colour: '', shipmentDate: '' },
    items,
    signoffs,
  };
}

/**
 * Atomic checklist mutation: applies fn then auto-persists.
 * @param {function} fn - Mutator function receiving the checklist object
 */
function updateChecklist(fn) {
  if (!state.currentChecklist) return;
  fn(state.currentChecklist);
  const idx = state.checklists.findIndex(c => c.id === state.currentChecklist.id);
  if (idx >= 0) state.checklists[idx] = state.currentChecklist;
  saveChecklists().catch(e => console.warn("[AQL] saveChecklists failed:", e.message));
}

function openChecklist(id) {
  const cl = state.checklists.find(c => c.id === id);
  if (!cl) return;
  state.currentChecklist = cl;
  state.screen = 'checklist';
  showHomeBtn();
  renderChecklistForm();
}

async function deleteChecklist(id) {
  if (!confirm(t('Remove this checklist? Make sure you have saved the PDF first.'))) return;
  const cl = state.checklists.find(c => c.id === id);
  if (!cl) return;
  const { customer, orderno } = cl;
  state.checklists = state.checklists.filter(c => c.id !== id);
  saveChecklists().catch(e => console.warn("[AQL] saveChecklists failed:", e.message));
  if (typeof sb !== 'undefined') {
    try { await sb.rest('DELETE', 'checklists', null, { id: `eq.${id}` }); } catch(e) { console.warn('[AQL] Delete checklist failed:', e.message); }
  }
  openOrderHub(encodeURIComponent(customer), encodeURIComponent(orderno));
}

function startChecklist(customerEnc, ordernoEnc) {
  const customer = decodeURIComponent(customerEnc);
  const orderno  = decodeURIComponent(ordernoEnc);
  const cl = newChecklist(customer, orderno);
  // Pre-fill header from existing reports
  const ref = state.reports.find(r => r.customer===customer && r.orderno===orderno)
           || state.interimReports.find(r => r.customer===customer && r.orderno===orderno);
  if (ref) {
    cl.header.styleName = ref.styleno || ref.modelNo || '';
    cl.header.colour    = ref.colour || '';
    cl.header.shipmentDate = ref.shipdate || '';
    cl.header.poNo = orderno;
  }
  state.checklists.push(cl);
  saveChecklists().catch(e => console.warn("[AQL] saveChecklists failed:", e.message));
  state.currentChecklist = cl;
  state.screen = 'checklist';
  showHomeBtn();
  renderChecklistForm();
}

}

    </div>

    ${sectionsHTML}

    <!-- SIGN OFF -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title" style="margin-bottom:10px">${t('QC & Packing Sign Off · İmzalar')}</div>
      <div style="display:flex;flex-direction:column;gap:10px">${signoffsHTML}</div>

      <button class="btn btn-primary" onclick="downloadChecklistPDF()">${t('📥 Download PDF')}</button>
    </div>
  `);
}

function setChecklistItem(itemId, val) {
  const cl = state.currentChecklist;
  if (!cl) return;
  updateChecklist(c => {
    if (!c.items[itemId]) c.items[itemId] = { result: null, comments: '', checkedBy: '', date: '' };
    // Toggle off if tapping same value again
    c.items[itemId].result = (c.items[itemId].result === val) ? null : val;
    if (c.items[itemId].result !== null) {
      c.items[itemId].date = localDateTimeStr();
    } else {
      c.items[itemId].date = '';
    }
  });
  renderChecklistForm();
}

function updateChecklistItemField(itemId, field, value) {
  updateChecklist(c => {
    if (!c.items[itemId]) c.items[itemId] = { result: null, comments: '', checkedBy: '', date: '' };
    c.items[itemId][field] = value;
  });
}

/**
 * Records or removes a sign-off on a checklist.
 * Stamps the current datetime automatically on sign-off.
 * @param {string} roleId - Signoff role ID ("packingSupv" | "qcSupv" | "warehouseSupv")
 */
function signOffChecklist(roleId) {
  const cl = state.currentChecklist;
  if (!cl) return;
  const so = cl.signoffs[roleId];
  if (!so.name) { toast(t('Please select a name first')); return; }
  if (so.signed) {
    if (!confirm(t('Remove this sign-off?'))) return;
    updateChecklist(c => { c.signoffs[roleId].signed = false; c.signoffs[roleId].date = ''; });
  } else {
    updateChecklist(c => { c.signoffs[roleId].signed = true; c.signoffs[roleId].date = localDateTimeStr(); });
  }
  renderChecklistForm();
}

/**
 * Builds the full A4 HTML document for the Final Checklist PDF.
 * Single page: header, order info, three checklist sections, signature footer.
 * @param {Object} cl - Checklist object
 * @returns {string} Full HTML document string
 */
function buildChecklistPDF(cl) {
  const logoSrc = typeof KOZAN_JPEG_LOGO !== 'undefined' ? KOZAN_JPEG_LOGO : '';
  const logoHTML = logoSrc
    ? `<img src="${logoSrc}" style="height:40px;width:auto;display:block">`
    : `<div style="font-weight:900;border:2px solid #333;padding:3px 7px;font-size:14px;font-family:monospace">KT</div>`;

  const sectionsHTML = CHECKLIST_SECTIONS.map(sec => {
    const rows = sec.items.map(item => {
      const e = cl.items[item.id] || {};
      const r = e.result;
      const checkColor = r === true ? '#15803d' : r === false ? '#dc2626' : '#999';
      const checkMark  = r === true ? '✓' : r === false ? '✗' : '';
      return `<tr>
        <td style="font-size:8.5px;padding:4px 8px;border:1px solid #d4d4d4">${item.en}</td>
        <td style="text-align:center;font-size:14px;font-weight:700;color:${checkColor};border:1px solid #d4d4d4;width:40px">${checkMark}</td>
        <td style="font-size:8px;padding:4px 8px;border:1px solid #d4d4d4;color:#333;width:110px">${e.checkedBy||''}</td>
        <td style="font-size:8px;padding:4px 8px;border:1px solid #d4d4d4;color:#555;width:90px;white-space:nowrap">${e.date||''}</td>
        <td style="font-size:8px;padding:4px 8px;border:1px solid #d4d4d4;color:#111">${e.comments||''}</td>
      </tr>`;
    }).join('');
    return `
      <tr><td colspan="5" style="background:#A6A6A6;color:#000;font-size:8px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;padding:4px 8px;border:1px solid #A6A6A6">${sec.title}</td></tr>
      <tr style="background:#d4d4d4">
        <th style="font-size:7.5px;padding:3px 8px;border:1px solid #bbb;text-align:left">Control Point / Kontrol Noktası</th>
        <th style="font-size:7.5px;padding:3px 8px;border:1px solid #bbb;width:40px;text-align:center">Result / Sonuç</th>
        <th style="font-size:7.5px;padding:3px 8px;border:1px solid #bbb;width:110px">Checked By / Kontrol Eden</th>
        <th style="font-size:7.5px;padding:3px 8px;border:1px solid #bbb;width:90px">Date / Tarih</th>
        <th style="font-size:7.5px;padding:3px 8px;border:1px solid #bbb">Comments / Açıklama</th>
      </tr>
      ${rows}`;
  }).join('');

  const signoffsHTML = CHECKLIST_SIGNOFF_ROLES.map((role, i) => {
    const so = cl.signoffs[role.id] || {};
    const isLast = i === CHECKLIST_SIGNOFF_ROLES.length - 1;
    // Shorten role labels for PDF so they don't wrap
    const shortLabel = role.label.split(' · ')[1] || role.label;
    return `
    <td style="border:none;padding:8px 12px;${!isLast?'border-right:1px solid #ccc;':''}width:33%;vertical-align:bottom">
      <div style="margin-bottom:8px;font-size:7px;color:#888;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${shortLabel}</div>
      <div style="font-size:9px;font-weight:600;min-height:14px">${so.name||'—'}</div>
      <div style="border-top:1.5px solid #111;margin-top:4px;padding-top:3px">
        <div style="font-size:7.5px;color:#666">${so.signed ? '✓ '+so.date : 'İmzalanmadı'}</div>
      </div>
    </td>`;
  }).join('');

  return `<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  .pdf-body { flex:1; }
  .pdf-footer { margin-top:auto; padding-top:6px; }
  .info-cell { padding:3px 5px; }
  .info-cell label { display:block; font-size:6.5px; color:#888; text-transform:uppercase; letter-spacing:0.04em; }
  .info-cell span { font-size:8.5px; font-weight:600; }
</style>
</head><body>
<div class="pdf-page">

<!-- HEADER -->
<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 8px 4px;background:#fff;border-bottom:1px solid #e5e7eb;margin-bottom:3px">

  <div style="text-align:center">
    <div style="font-size:11px;font-weight:700;letter-spacing:0.05em;color:#374151">PACKAGING &amp; QC CONTROL CHECKLIST</div>

<!-- ORDER INFO ROW — matches final report style -->

function downloadChecklistPDF() {
  const cl = state.currentChecklist;
  if (!cl) return;
  const html = buildChecklistPDF(cl);
  _triggerPDFDownload(html, (cl.orderno||cl.header.poNo||'ORDER').replace(/[^a-zA-Z0-9\-_]/g,'_') + '_KONTROLLISTE.pdf', 5);
}

/**
 * Renders the Order Hub for a given customer + PO number.
 * Shows all in-line, final, and checklist reports for that order.
 * @param {string} customerEnc - URI-encoded customer name
 * @param {string} ordernoEnc  - URI-encoded order number
 */
function openOrderHub(customerEnc, ordernoEnc) {
  const customer = decodeURIComponent(customerEnc);
  const orderno  = decodeURIComponent(ordernoEnc);
  state.screen = 'hub';
  state._hubCustomer = customer;
  state._hubOrderno  = orderno;
  showHomeBtn();

  const finals   = state.reports.filter(r => r.customer === customer && r.orderno === orderno);
  const interims = state.interimReports.filter(r => r.customer === customer && r.orderno === orderno);
  const checks   = state.checklists.filter(c => c.customer === customer && c.orderno === orderno);
  const ref = finals[0] || interims[0];

  const MAX_INTERIM = 3;
  const MAX_FINAL = 3;
  const MAX_CHECKLIST = 1;
  const canAddInterim   = interims.length < MAX_INTERIM;
  const canAddFinal     = finals.length < MAX_FINAL;
  const canAddChecklist = checks.length < MAX_CHECKLIST;

  render(`
    <div style="margin-bottom:18px">
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">Order</div>
      <div style="font-size:22px;font-weight:700;letter-spacing:-0.02em">${customer} &nbsp;·&nbsp; ${orderno}</div>
      ${ref ? `<div style="font-size:12px;color:var(--muted);margin-top:3px">${ref.supplier||''} ${ref.styleno||ref.modelNo ? '· '+(ref.styleno||ref.modelNo) : ''}</div>` : ''}
    </div>

    <div class="card-title" style="margin-bottom:10px">${t('Create New Report')}</div>
    <div class="report-type-card interim ${canAddInterim?'':'disabled'}" onclick="${canAddInterim?`startInterimReport('${customerEnc}','${ordernoEnc}')`:''}" style="${canAddInterim?'':'opacity:0.5;cursor:not-allowed'}">
      <div class="rtc-icon">⚡</div>
      <div class="rtc-body">
        <h3>${uiLang==='tr'?'Ara Kontrol Raporu':'In-Line Control Report'}</h3>
        <p>${t('Mid-production quality check. Records packaging, criteria findings, and signatures.')}<br><span style="color:var(--accent2);font-weight:600">${interims.length}/${MAX_INTERIM} ${t('used')}</span>${!canAddInterim?' — <span style="color:var(--fail)">'+t('Maximum reached')+'</span>':''}</p>
      </div>
    </div>
    <div class="report-type-card final ${canAddFinal?'':'disabled'}" onclick="${canAddFinal?`startFinalFromHub('${customerEnc}','${ordernoEnc}')`:''}" style="${canAddFinal?'':'opacity:0.5;cursor:not-allowed'}">
      <div class="rtc-icon">📋</div>
      <div class="rtc-body">
        <h3>${uiLang==='tr'?'Final Kontrol Raporu':'Final Inspection Report'}</h3>
        <p>${t('Full AQL inspection with defect logging, AQL limits, photos, and pass/fail result.')}<br><span style="color:var(--accent2);font-weight:600">${finals.length}/${MAX_FINAL} ${t('used')}</span>${!canAddFinal?' — <span style="color:var(--fail)">'+t('Maximum reached')+'</span>':''}</p>
      </div>
    </div>
    <div class="report-type-card ${canAddChecklist?'':'disabled'}" onclick="${canAddChecklist?`startChecklist('${customerEnc}','${ordernoEnc}')`:''}" style="border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:border-color 0.15s;${canAddChecklist?'':'opacity:0.5;cursor:not-allowed'}">
      <div class="rtc-icon" style="background:rgba(34,197,94,0.12);color:var(--pass);font-size:18px">✅</div>
      <div class="rtc-body">
        <h3>${uiLang==='tr'?'Final Kontrol Listesi':'Final Checklist'}</h3>
        <p>${t('Packaging, production & QC sign-off checklist.')}<br><span style="color:var(--accent2);font-weight:600">${checks.length}/${MAX_CHECKLIST} ${t('used')}</span>${!canAddChecklist?' — <span style="color:var(--fail)">'+t('Already created')+'</span>':''}</p>
      </div>
    </div>

    ${interims.length ? `
    <div class="card-title" style="margin:18px 0 10px">⚡ Ara Kontrol / In-Line Raporları (${interims.length})</div>
    ${interims.slice().reverse().map(ir => {
      const d = ir.createdAt ? new Date(ir.createdAt).toLocaleDateString() : '—';
      return `<div class="report-card" onclick="showReportActions('interim','${ir.id}')">
        <div class="rc-left">
          <h3>In-Line #${ir.interimNo||1} &nbsp;·&nbsp; ${d}</h3>
          <p>${ir.modelNo||ir.styleno||'—'} · Size: ${ir.size||'—'} · ${ir.qcName||ir.supervisorName||'—'}</p>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="badge badge-interim">In-Line</span>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteInterim('${ir.id}')">✕</button>
        </div>
      </div>`;
    }).join('')}` : ''}

    ${finals.length ? `
    <div class="card-title" style="margin:18px 0 10px">📋 Final Reports (${finals.length})</div>
    ${finals.slice().reverse().map(r => {
      const { maj, min } = defectTotals(r);
      const badge = r.status==='draft'
        ? `<span class="badge badge-draft">${t('Draft')}</span>`
        : r.result==='pass' ? `<span class="badge badge-pass">${t('PASSED')}</span>` : `<span class="badge badge-fail">${t('FAILED')}</span>`;
      const date = r.inspstart ? formatDT(r.inspstart) : new Date(r.createdAt).toLocaleDateString();
      return `<div class="report-card" onclick="showReportActions('final','${r.id}')">
        <div class="rc-left">
          <h3>Final #${r.finalInspectionNo||1} &nbsp;·&nbsp; ${date}</h3>
          <p>${r.styleno||t('No style')} · ${t('Major')}: ${maj} ${t('Minor')}: ${min}</p>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${badge}
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteReport('${r.id}')">✕</button>
        </div>
      </div>`;
    }).join('')}` : ''}

    ${checks.length ? `
    <div class="card-title" style="margin:18px 0 10px">${t('✅ Final Checklist')}</div>
    ${checks.map(c => {
      const total = Object.values(c.items||{}).length;
      const done  = Object.values(c.items||{}).filter(v => v.result !== null).length;
      const signed = CHECKLIST_SIGNOFF_ROLES.filter(r => c.signoffs?.[r.id]?.signed).length;
      return `<div class="report-card" onclick="openChecklist('${c.id}')">
        <div class="rc-left">
          <h3>${t('Checklist · ')}${new Date(c.createdAt).toLocaleDateString()}</h3>
          <p>${done}/${total} ${t('items checked')} · ${signed}/${CHECKLIST_SIGNOFF_ROLES.length} ${t('signed off')}</p>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="badge" style="background:rgba(34,197,94,0.12);color:var(--pass)">✅ ${t('Final Checklist · Son Kontrol Listesi')}</span>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteChecklist('${c.id}')">✕</button>
        </div>
      </div>`;
    }).join('')}` : ''}

    <div style="height:20px"></div>
  `);
}

function startFinalFromHub(customerEnc, ordernoEnc) {
  const customer = decodeURIComponent(customerEnc);
  const orderno  = decodeURIComponent(ordernoEnc);
  const ref = state.reports.find(r => r.customer===customer && r.orderno===orderno)
           || state.interimReports.find(r => r.customer===customer && r.orderno===orderno);
  camClose();
  const r = newReport();
  r.inspstart = localNowString();
  r.customer  = customer;
  r.orderno   = orderno;
  if (ref) {
    r.supplier    = ref.supplier    || '';
    r.styleno     = ref.styleno     || ref.modelNo || '';
    r.description = ref.description || '';
    r.colour      = ref.colour      || '';
    r.fabric      = ref.fabric      || ref.fabricDesc || ''; // carry from in-line too
    r.shipdate    = ref.shipdate    || '';
    r.orderqty    = ref.orderqty    || 0;
    r.shipqty     = ref.shipqty     || 0;
  }
  updateReports(reports => reports.push(r));
  state.currentReport = r;
  state.screen = 'wizard';
  state.wizardStep = 1;
  showHomeBtn();
  showWizardStep(1);
}

// INTERIM REPORT FLOW
