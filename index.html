<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AQL Inspector · Inspection System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #0d0f14;
  --bg2: #161a22;
  --bg3: #1e2330;
  --surface: #242938;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f2f7;
  --muted: #8892a4;
  --accent: #ffffff;
  --accent2: #3a6fd4;
  --pass: #22c55e;
  --pass-bg: rgba(34,197,94,0.12);
  --fail: #ef4444;
  --fail-bg: rgba(239,68,68,0.12);
  --warn: #f59e0b;
  --warn-bg: rgba(245,158,11,0.12);
  --radius: 10px;
  --r-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100%;
  font-size: 14px;
  line-height: 1.5;
}
.app { display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.topbar-logo { display: flex; align-items: center; gap: 10px; }
.topbar-logo .icon {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff; font-weight: 700;
}
.topbar-logo h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
.topbar-logo span { color: var(--muted); font-weight: 400; font-size: 13px; }
.main { flex: 1; padding: 20px 16px 40px; max-width: 760px; margin: 0 auto; width: 100%; }

.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; padding: 9px 18px; border-radius: var(--r-sm);
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; border: none; transition: all 0.15s;
  text-decoration: none;
}
.btn-primary { background: var(--accent2); color: #fff; }
.btn-primary:hover { background: #2d5ab8; }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--surface); color: var(--text); }
.btn-danger { background: var(--fail-bg); color: var(--fail); border: 1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background: rgba(239,68,68,0.2); }
.btn-success { background: var(--pass-bg); color: var(--pass); border: 1px solid rgba(34,197,94,0.2); }
.btn-lg { padding: 12px 24px; font-size: 15px; border-radius: var(--radius); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
}
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-title { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.field input, .field select, .field textarea {
  width: 100%; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--r-sm); padding: 9px 12px; font-family: inherit;
  font-size: 14px; color: var(--text); outline: none;
  transition: border-color 0.15s;
}
.field select { color: #111; background: #f5f5f5; }
.field select option { color: #111; background: #fff; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent2); }
.field textarea { resize: vertical; min-height: 70px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

.steps {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 22px; overflow-x: auto;
  padding-bottom: 2px;
}
.step-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 500; color: var(--muted);
  white-space: nowrap; padding: 6px 10px 6px 0;
}
.step-item.active { color: var(--accent); }
.step-item.done { color: var(--pass); }
.step-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--surface); border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.step-item.active .step-num { background: var(--accent); border-color: var(--accent); color: #fff; }
.step-item.done .step-num { background: var(--pass-bg); border-color: var(--pass); color: var(--pass); }
.step-arrow { color: var(--border2); margin: 0 4px; font-size: 12px; }

.dash-header { margin-bottom: 24px; }
.dash-header h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
.dash-header p { color: var(--muted); font-size: 14px; margin-top: 4px; }
.report-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s;
}
.report-card:hover { border-color: var(--border2); }
.report-card .rc-left h3 { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
.report-card .rc-left p { font-size: 12px; color: var(--muted); }
.badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-pass { background: var(--pass-bg); color: var(--pass); }
.badge-fail { background: var(--fail-bg); color: var(--fail); }
.badge-draft { background: var(--warn-bg); color: var(--warn); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state .es-icon { font-size: 40px; margin-bottom: 14px; opacity: 0.4; }
.empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }

.aql-option {
  border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 14px; cursor: pointer; transition: all 0.15s;
  margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
}
.aql-option:hover { border-color: var(--border2); }
.aql-option.selected { border-color: var(--accent); background: rgba(79,142,247,0.06); }
.aql-option .ao-radio {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid var(--border2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.aql-option.selected .ao-radio { border-color: var(--accent); }
.aql-option.selected .ao-radio::after {
  content:''; width: 8px; height: 8px;
  background: var(--accent); border-radius: 50%;
}
.aql-option .ao-body h3 { font-size: 14px; font-weight: 500; }
.aql-option .ao-body p { font-size: 12px; color: var(--muted); }
.aql-summary {
  background: var(--surface); border-radius: var(--radius);
  padding: 16px; display: grid; grid-template-columns: repeat(4,1fr); gap: 12px;
  text-align: center; margin-top: 16px;
}
.aql-summary .as-item label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 4px; }
.aql-summary .as-item span { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--accent); }

.defect-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
  padding: 8px 0 6px; border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.defect-item {
  display: flex; align-items: center; padding: 8px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px; flex-wrap: wrap;
}
.defect-item:last-child { border-bottom: none; }
.defect-code { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); width: 36px; flex-shrink: 0; }
.defect-name { flex: 1; font-size: 13px; line-height: 1.3; }
.defect-name small { display: block; color: var(--muted); font-size: 11px; }
.defect-counters { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
.counter-group { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.counter-group label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-weight: 600; }
.counter-ctrl { display: flex; align-items: center; gap: 0; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r-sm); overflow: hidden; }
.counter-ctrl button {
  width: 28px; height: 28px; background: none; border: none;
  color: var(--text); font-size: 16px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: background 0.1s;
  font-family: inherit;
}
.counter-ctrl button:hover { background: var(--surface); }
.counter-ctrl span { width: 28px; text-align: center; font-size: 13px; font-family: 'DM Mono', monospace; font-weight: 500; color: var(--text); }
.counter-ctrl span.nonzero { color: var(--warn); }

.status-bar {
  position: sticky; top: 52px; z-index: 90;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 12px;
  margin: -20px -16px 20px;
}
.status-result {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
}
.status-result.pass { background: var(--pass-bg); color: var(--pass); border: 1px solid rgba(34,197,94,0.25); }
.status-result.fail { background: var(--fail-bg); color: var(--fail); border: 1px solid rgba(239,68,68,0.25); }
.status-result.pending { background: var(--warn-bg); color: var(--warn); border: 1px solid rgba(245,158,11,0.25); }
.status-counts { display: flex; gap: 10px; }
.status-counts .sc { display: flex; align-items: center; gap: 5px; font-size: 12px; }
.status-counts .sc strong { font-family: 'DM Mono', monospace; font-size: 14px; }
.status-counts .sc.ok strong { color: var(--pass); }
.status-counts .sc.ov strong { color: var(--fail); }
.status-counts .sc.warn strong { color: var(--warn); }

.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
.photo-thumb {
  aspect-ratio: 1; border-radius: var(--r-sm); overflow: hidden;
  position: relative; background: var(--surface); border: 1px solid var(--border);
  cursor: pointer;
}
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-thumb .pt-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.7); padding: 4px 6px;
  font-size: 10px; color: #fff; text-align: center;
}
.photo-thumb .pt-del {
  position: absolute; top: 4px; right: 4px;
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(0,0,0,0.7); border: none; color: #fff;
  cursor: pointer; font-size: 13px; display: flex;
  align-items: center; justify-content: center;
}
.camera-preview {
  width: 100%; aspect-ratio: 4/3; background: #000;
  border-radius: var(--radius); overflow: hidden; position: relative;
  margin-bottom: 10px;
}
.camera-preview video { width: 100%; height: 100%; object-fit: cover; }
.camera-preview canvas { display: none; }
.camera-overlay {
  position: absolute; inset: 0;
  border: 2px solid rgba(79,142,247,0.4);
  border-radius: var(--radius);
  pointer-events: none;
}
.camera-overlay::before, .camera-overlay::after {
  content: ''; position: absolute;
  width: 20px; height: 20px; border-color: var(--accent);
  border-style: solid; border-width: 0;
}
.camera-overlay::before { top: 10px; left: 10px; border-top-width: 2px; border-left-width: 2px; }
.camera-overlay::after { bottom: 10px; right: 10px; border-bottom-width: 2px; border-right-width: 2px; }
.shutter-btn {
  width: 64px; height: 64px; border-radius: 50%;
  background: #fff; border: 4px solid var(--accent);
  cursor: pointer; margin: 0 auto; display: block;
  transition: transform 0.1s, opacity 0.1s;
}
.shutter-btn:hover { opacity: 0.9; }
.shutter-btn:active { transform: scale(0.93); }
.photo-label-select { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
.photo-label-btn {
  padding: 5px 12px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--border2); background: transparent; color: var(--muted);
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.photo-label-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.report-preview {
  background: #fff; color: #111;
  border-radius: var(--radius); padding: 0;
  overflow: hidden; font-family: 'DM Sans', sans-serif;
}
.rp-header {
  background: #dde3f0; color: #333333; padding: 16px 20px;
  display: flex; justify-content: space-between; align-items: flex-start;
}
.rp-header h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.rp-header .rp-sub { font-size: 11px; opacity: 0.7; margin-top: 3px; }
.rp-result-badge {
  padding: 6px 16px; border-radius: 4px; font-size: 14px; font-weight: 700;
  letter-spacing: 0.08em;
}
.rp-result-badge.pass { background: rgba(34,197,94,0.25); color: #22c55e; border: 1.5px solid #22c55e; }
.rp-result-badge.fail { background: rgba(239,68,68,0.25); color: #ef4444; border: 1.5px solid #ef4444; }
.rp-section { padding: 12px 20px; border-bottom: 1px solid #e5e7eb; }
.rp-section-title { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #BFBFBF; margin-bottom: 10px; }
.rp-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.rp-field label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.07em; display: block; margin-bottom: 2px; }
.rp-field span { font-size: 13px; font-weight: 500; color: #111; }
.rp-defects { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.rp-defect-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #f3f4f6; font-size: 12px; }
.rp-defect-row span:last-child { font-weight: 700; color: #A6A6A6; font-family: 'DM Mono', monospace; }
.rp-photo-grid {
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;}
.rp-photo { aspect-ratio: 1; border-radius: 4px; overflow: hidden; }
.rp-photo img { width: 100%; height: 100%; object-fit: cover; }
.rp-photo p { font-size: 10px; color: #BFBFBF; text-align: center; margin-top: 3px; }
.rp-sig-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 10px; }
.rp-sig { border-top: 1.5px solid #111; padding-top: 5px; }
.rp-sig .role { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; }
.rp-sig .name { font-size: 12px; font-weight: 500; margin-top: 2px; }
.rp-totals { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.rp-total-box { background: #f9fafb; border-radius: 6px; padding: 10px; text-align: center; }
.rp-total-box label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.07em; display: block; }
.rp-total-box span { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }
.rp-total-box span.ok { color: #22c55e; }
.rp-total-box span.ov { color: #ef4444; }

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg2); border-top: 1px solid var(--border);
  padding: 12px 16px; display: flex; gap: 10px; justify-content: space-between;
  z-index: 100;
}
.spacer { height: 80px; }

.section-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; overflow-x: auto; }
.tab-btn {
  padding: 8px 14px; border: none; background: none; color: var(--muted);
  font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 24px; padding: 10px 20px; font-size: 13px; font-weight: 500;
  z-index: 999; animation: slideUp 0.2s ease;
  white-space: nowrap; pointer-events: none;
}
@keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(10px); } }
.divider { height: 1px; background: var(--border); margin: 14px 0; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.tag-info { background: rgba(79,142,247,0.15); color: var(--accent); }


.badge-interim { background: rgba(139,92,246,0.15); color: #a78bfa; }
.badge-count { background: var(--surface); color: var(--muted); font-size:10px; padding:2px 7px; border-radius:20px; font-weight:600; }
.order-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s;
}
.order-card:hover { border-color: var(--border2); }
.order-card .oc-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.order-card .oc-meta { display: flex; gap: 8px; flex-wrap: wrap; }

.report-type-card {
  border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 18px; cursor: pointer; transition: all 0.15s; margin-bottom: 10px;
  display: flex; gap: 14px; align-items: flex-start;
}
.report-type-card:hover { border-color: var(--border2); background: var(--surface); }
.report-type-card .rtc-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
.report-type-card .rtc-body h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.report-type-card .rtc-body p { font-size: 12px; color: var(--muted); line-height:1.5; }
.report-type-card.interim { border-color: rgba(139,92,246,0.35); }
.report-type-card.final { border-color: rgba(58,111,212,0.35); }

.interim-check-row {
  display: flex; align-items: center; padding: 10px 0;
  border-bottom: 1px solid var(--border); gap: 12px;
}
.interim-check-row:last-child { border-bottom: none; }
.check-label { flex: 1; font-size: 13px; }
.check-label small { display: block; color: var(--muted); font-size: 11px; }
.check-toggle { display: flex; gap: 6px; flex-shrink: 0; }
.check-btn { padding: 5px 14px; border-radius: var(--r-sm); font-size: 12px; font-weight: 600; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.12s; }
.check-btn.ok { background: var(--pass-bg); color: var(--pass); border-color: rgba(34,197,94,0.3); }
.check-btn.issue { background: var(--fail-bg); color: var(--fail); border-color: rgba(239,68,68,0.3); }

/* Interim Report Print Styles */
.interim-rp-header {
  background: #d9d9d9; padding: 8px 14px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 2px solid #999;
}

</style>
</head>
<body>
<div class="app">

// Every mutation of reports goes through here — storage is automatic
function updateReports(fn) {
  fn(state.reports);
  persistReports();
}

// Every mutation of currentReport goes through here
function updateReport(fn) {
  if (!state.currentReport) return;
  fn(state.currentReport);
  // Sync back into the reports array
  const idx = state.reports.findIndex(r => r.id === state.currentReport.id);
  if (idx >= 0) state.reports[idx] = state.currentReport;
  persistReports();
}

// STORAGE
// ══════════════════════════════════════════════════════════════════════

async function persistReports() {
  // Sort by date ascending so oldest is first (index 0)
  const sorted = [...state.reports].sort((a, b) => {
    const da = a.savedAt || a.date || '';
    const db = b.savedAt || b.date || '';
    return da < db ? -1 : da > db ? 1 : 0;
  });

  try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
  try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
  let attempts = 0;
  while (sorted.length > 0) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sorted));
      if (attempts > 0) {
        state.reports = sorted;
        toast(`⚠️ ${t('Storage full — oldest reports removed to make space. Download PDFs to keep them.')}`, 6000);
      }
      break;
    } catch (e) {
      sorted.shift();
      attempts++;
    }
  }
  if (sorted.length === 0 && attempts > 0) {
    toast(t('⚠️ Storage critically full. Please export reports as PDF and clear storage.'), 8000);
  }

  // ── Supabase sync ──────────────────────────────────────────────
  if (typeof sb !== 'undefined') {
    for (const r of state.reports) {
      try {
        await uploadPendingPhotos(r);
        const row = reportToRow(r);
        await sb.rest('POST', 'reports', row, { on_conflict: 'id' });
        console.log('[AQL] ✅ Synced report:', r.id);
      } catch (e) {
        console.error('[AQL] ❌ Failed to sync report', r.id, e.message);
      }
    }
  }
}

// Kept for backward-compat call sites that haven't migrated yet
function saveReports() { persistReports(); }

(function loadReports() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state.reports = JSON.parse(raw);
  } catch (e) {
    toast(t('⚠️ Could not load saved reports'));
  }
})();

// Download a full .json backup to device
function saveReportToFile(r) {
  const brand    = (r.customer || 'Brand').replace(/[^a-zA-Z0-9]/g, '_');
  const po       = (r.orderno  || 'PO'   ).replace(/[^a-zA-Z0-9]/g, '_');
  const blob = new Blob([JSON.stringify(r, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `${brand}_${po}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// Import .json files back in
function importReports(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  let pending = files.length;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const r = JSON.parse(e.target.result);
        if (!r.id) throw new Error('invalid');
        updateReports(reports => {
          const idx = reports.findIndex(x => x.id === r.id);
          if (idx >= 0) reports[idx] = r; else reports.push(r);
        });
      } catch (_) {
        toast(`⚠️ ${t('Could not read file:')} ${file.name}`);
      }
      if (--pending === 0) { showDashboard(); toast(`✓ ${files.length} ${t('report')}${files.length > 1 ? ' ' : ' '}${t('imported')}`); }
    };
    reader.onerror = () => { toast(`⚠️ ${t('Failed to read file:')} ${file.name}`); --pending; };
    reader.readAsText(file);
  });
}

async function savePeople(p) {
  // Always save to localStorage first — this is the source of truth
  try { localStorage.setItem(PEOPLE_KEY, JSON.stringify(p)); } catch(_) {}

// IMAGE COMPRESSION  —  single function used by all photo paths
// ══════════════════════════════════════════════════════════════════════

function compressImage(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let { width: w, height: h } = img;
      if (w > PHOTO_MAX_DIM || h > PHOTO_MAX_DIM) {
        if (w > h) { h = Math.round(h * PHOTO_MAX_DIM / w); w = PHOTO_MAX_DIM; }
        else        { w = Math.round(w * PHOTO_MAX_DIM / h); h = PHOTO_MAX_DIM; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', PHOTO_QUALITY));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

// BUSINESS LOGIC
// ══════════════════════════════════════════════════════════════════════

function getAQLLimits(qty, level) {
  const table = AQL_TABLES[level] || AQL_TABLES['2.5'];
  const keys  = Object.keys(table).map(Number).sort((a, b) => a - b);
  // Pick the highest threshold that is still <= qty (bracket logic: 281 <= 500 < 501)
  let key = keys[0];
  for (let i = 0; i < keys.length; i++) {
    if (keys[i] <= qty) key = keys[i];
  }
  const [sampleQty, critical, major, minor] = table[key];
  return { sampleQty, critical, major, minor };
}

function defectTotals(report) {
  let maj = 0, min = 0;
  Object.values(report.defects || {}).forEach(d => { maj += d.maj || 0; min += d.min || 0; });
  return { maj, min };
}

function autoResult(report) {
  const { maj, min } = defectTotals(report);
  return (maj > report.majorLimit || min > report.minorLimit) ? 'fail' : 'pass';
}

function newReport() {
  return {
    id: 'RPT-' + Date.now(), createdAt: new Date().toISOString(), status: 'draft',
    customer:'', orderno:'', orderqty:0, shipqty:0, supplier:'', styleno:'',
    description:'', colour:'', fabric:'', shipdate:'', inspstart:'', inspfinish:'',
    aqlLevel:'1.5', sampleQty:' ', majorLimit:5, minorLimit:10, criticalLimit:0,
    defects:{}, photos:[],
    totalBoxes:0, boxesChecked:0, boxesCheckedList:'', piecesChecked:' ',
    inlineInspections:0, finalInspectionNo:1,
    productionPerSample:'yes', sampleAvailable:'yes', comments:'', result:'pending',
    qcName:'', deptManager:'', qaManager:'', supplierRep:'',
  };
}

// normalise legacy single-photo field → photos array
function normDefectPhotos(d) {
  if (!d.photos) d.photos = d.photo ? [d.photo] : [];
  return d;
}

const qs     = sel => document.querySelector(sel);
const render = html => qs('#main-content').innerHTML = html;

function toast(msg, dur = TOAST_DURATION) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur);
}

function formatDT(val) {
  if (!val) return '—';
  const d = new Date(val);
  if (isNaN(d)) return val;
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function localNowString() {
  const now = new Date(), p = n => String(n).padStart(2, '0');
  return `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())}T${p(now.getHours())}:${p(now.getMinutes())}`;
}

function formatShipDate(input) {
  let v = input.value.replace(/\D/g, '');
  if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
  if (v.length > 5) v = v.slice(0,5) + '/' + v.slice(5);
  input.value = v.slice(0,10);
}

function buildDefectRowsForCats(catIds, r, mode) {
  // mode: 'preview' → div-based; 'print' → table-row based
  let out = '';
  catIds.forEach(catId => {
    const cat = DEFECT_CATEGORIES.find(c => c.id === catId);
    if (!cat) return;
    if (mode === 'preview') {
      out += `<div style="font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:#dde3f0;padding:4px 8px;margin-top:6px">${cat.label} · ${cat.sub}</div>`;
      cat.items.forEach(item => {
        const d   = r.defects[item.code] || {maj:0,min:0};
        const hi  = (d.maj>0||d.min>0) ? '#fee2e2' : 'transparent';
        out += `<div style="display:flex;padding:3px 8px;border-bottom:1px solid #f0f0f0;background:${hi};break-inside:avoid">
          <span style="width:34px;font-size:10px;font-family:monospace">${item.code}</span>
          <span style="flex:1;font-size:11px">${item.en}<br><span style="color:#9ca3af;font-size:10px">${item.tr}</span></span>
          <span style="width:36px;text-align:center;font-weight:700;color:${d.maj?'#ef4444':'#ccc'}">${d.maj||'—'}</span>
          <span style="width:36px;text-align:center;font-weight:700;color:${d.min?'#ef4444':'#ccc'}">${d.min||'—'}</span>
        </div>`;
      });
    } else {
      out += `<tr><td colspan="4" style="background:#a6a6a6;font-weight:800;font-size:8.5px;padding:2px 4px;text-transform:uppercase;border:1px solid #bbb">${cat.label} · ${cat.sub}</td></tr>`;
      cat.items.forEach(item => {
        const d    = r.defects[item.code] || {maj:0,min:0};
        const hasDef = d.maj>0||d.min>0;
        out += `<tr style="${hasDef?'background:#fee2e2':''}">
          <td style="font-size:8px;font-family:monospace;padding:1px 3px;color:#A6A6A6;white-space:nowrap;border:1px solid #ccc">${item.code}</td>
          <td style="font-size:7.5px;padding:1px 3px;border:1px solid #ccc;line-height:1.2">${item.en}<br><span style="color:#888;font-size:7px">${item.tr}</span></td>

    }

  return out;

function getStorageInfo() {
  let used = 0;
  for (let k in localStorage) {
    if (localStorage.hasOwnProperty(k)) {
      try { used += (localStorage.getItem(k) || '').length * 2; } catch(_) {}
    }
  }
  const usedKB = Math.round(used / 1024);
  const pct = Math.min(100, Math.round(used / (5 * 1024 * 1024) * 100));
  return { usedKB, pct };
}

function clearAllStorage() {
  if (!confirm(t('Clear ALL storage?\n\nThis will delete all saved reports and data. Make sure you have exported any reports you need as PDF first.'))) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
  try { localStorage.removeItem(INTERIM_KEY); } catch (_) {}
  state.reports = [];
  state.interimReports = [];
  toast(t('✓ Storage cleared'));
  showDashboard();
}

function showStorageManager() {
  const info = getStorageInfo();
  const color = info.pct > 85 ? 'var(--fail)' : info.pct > 60 ? 'var(--warn)' : 'var(--pass)';
  state.screen = 'storage';

  render(`

function filterOrders() {
  const po = (qs('#search-po')?.value || '').toLowerCase().trim();
  const orders = (state._orders || []).filter(o => {
    if (po && !(o.orderno||'').toLowerCase().includes(po) && !(o.customer||'').toLowerCase().includes(po)) return false;
    return true;
  });
  const list = qs('#order-list');
  if (!list) return;
  if (!(state._orders||[]).length) {
    list.innerHTML = `<div class="empty-state"><div class="es-icon">📋</div><h3>${t('No inspections yet')}</h3><p>${t('Start your first inspection report')}</p></div>`;
    return;
  }
  if (!orders.length) {
    list.innerHTML = `<div class="empty-state"><div class="es-icon">🔍</div><h3>${t('No results found')}</h3><p>${t('Try adjusting your search')}</p></div>`;
    return;
  }
  list.innerHTML = orders.map(o => {
    const fi = o.finals.length, ii = o.interims.length;
    const lastFinal = o.finals.slice(-1)[0];
    const overallResult = lastFinal ? lastFinal.result : null;
    const resultBadge = overallResult === 'pass'
      ? `<span class="badge badge-pass">PASSED</span>`
      : overallResult === 'fail'
        ? `<span class="badge badge-fail">FAILED</span>`
        : '';
    return `<div class="order-card" onclick="openOrderHub('${encodeURIComponent(o.customer||'')}','${encodeURIComponent(o.orderno||'')}')">
      <div>
        <div class="oc-title">${o.customer||'—'} &nbsp;·&nbsp; ${o.orderno||'—'}</div>
        <div class="oc-meta" style="margin-top:5px">
          ${ii > 0 ? `<span class="badge badge-interim">⚡ ${ii} Interim</span>` : ''}
          ${fi > 0 ? `<span class="badge" style="background:rgba(58,111,212,0.12);color:var(--accent2)">📋 ${fi} Final</span>` : ''}
          ${resultBadge}
        </div>
      </div>
      <span style="color:var(--muted);font-size:20px">›</span>
    </div>`;
  }).join('');
}

          <span class="badge badge-interim">Interim</span>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteInterim('${ir.id}')">✕</button>
        </div>
      </div>`;
    }).join('')}` : ''}

    ${finals.length ? `
    <div class="card-title" style="margin:18px 0 10px">📋 Final Reports (${finals.length})</div>
    ${finals.slice().reverse().map(r => {
      const { maj, min } = defectTotals(r);
      const badge = r.status==='draft'
        ? `<span class="badge badge-draft">${t('Draft')}</span>`
        : r.result==='pass' ? `<span class="badge badge-pass">${t('PASSED')}</span>` : `<span class="badge badge-fail">${t('FAILED')}</span>`;
      const date = r.inspstart ? formatDT(r.inspstart) : new Date(r.createdAt).toLocaleDateString();
      return `<div class="report-card" onclick="openReport('${r.id}')">
        <div class="rc-left">
          <h3>Final #${r.finalInspectionNo||1} &nbsp;·&nbsp; ${date}</h3>
          <p>${r.styleno||t('No style')} · ${t('Major')}: ${maj} ${t('Minor')}: ${min}</p>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${badge}
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteReport('${r.id}')">✕</button>
        </div>
      </div>`;
    }).join('')}` : ''}

    <div style="height:20px"></div>
  `);
}

function startFinalFromHub(customerEnc, ordernoEnc) {
  const customer = decodeURIComponent(customerEnc);
  const orderno  = decodeURIComponent(ordernoEnc);
  const ref = state.reports.find(r => r.customer===customer && r.orderno===orderno)
           || state.interimReports.find(r => r.customer===customer && r.orderno===orderno);
  stopCamera();
  const r = newReport();
  r.inspstart = localNowString();
  r.customer  = customer;
  r.orderno   = orderno;
  if (ref) {
    r.supplier    = ref.supplier    || '';
    r.styleno     = ref.styleno     || ref.modelNo || '';
    r.description = ref.description || '';
    r.colour      = ref.colour      || '';
    r.fabric      = ref.fabric      || '';
    r.shipdate    = ref.shipdate    || '';
    r.orderqty    = ref.orderqty    || 0;
    r.shipqty     = ref.shipqty     || 0;
  }
  updateReports(reports => reports.push(r));
  state.currentReport = r;
  state.screen = 'wizard';
  state.wizardStep = 1;
  showHomeBtn();
  showWizardStep(1);
}

function newInterimReport(customer, orderno) {
  const existingCount = state.interimReports.filter(r => r.customer===customer && r.orderno===orderno).length;
  const now = new Date(), p = n => String(n).padStart(2,'0');
  return {
    id: 'INT-' + Date.now(), createdAt: new Date().toISOString(), type: 'interim',
    customer, orderno, interimNo: existingCount + 1,
    supplier: 'KOZAN', modelNo: '', size: '', colour: '', qty: '', fabricDesc: '',
    date: `${p(now.getDate())}/${p(now.getMonth()+1)}/${now.getFullYear()}`,
    time: `${p(now.getHours())}:${p(now.getMinutes())}`,
    pkg: { neckLabel:null, washLabel:null, assortHanger:null, boxLabel:null, accessory:null },
    findings: {
      fabricQuality:'', colourWingDiff:'', measurements:'', stitchQuality:'',
      skipStitchNeedle:'', oilStain:'', threadClean:'', labelPosition:'',
      symmetry:'', ironQuality:'', printEmbroidery:'', buttonHole:'', collarElasticity:'',
    },
    generalObservation: '', supervisorName: '', qcName: '',
  };
}

function startInterimReport(customerEnc, ordernoEnc) {
  const customer = decodeURIComponent(customerEnc);
  const orderno  = decodeURIComponent(ordernoEnc);
  const ref = state.reports.find(r => r.customer===customer && r.orderno===orderno)
           || state.interimReports.find(r => r.customer===customer && r.orderno===orderno);
  const ir = newInterimReport(customer, orderno);
  if (ref) {
    ir.supplier = ref.supplier || ir.supplier;
    ir.modelNo  = ref.styleno || ref.modelNo || '';
    ir.colour   = ref.colour || '';
  }
  state.interimReports.push(ir);
  saveInterimReports();
  state.currentInterim = ir;
  state.screen = 'interim';
  showHomeBtn();
  renderInterimForm();
}

function openInterim(id) {
  const ir = state.interimReports.find(r => r.id === id);
  if (!ir) return;
  state.currentInterim = ir;
  downloadInterimPDF();
}

function deleteInterim(id) {
  if (!confirm('Remove this interim report?\n\nMake sure you have saved the PDF first.')) return;
  const idx = state.interimReports.findIndex(r => r.id === id);
  if (idx === -1) return;
  state.interimReports.splice(idx, 1);
  saveInterimReports();
  showDashboard();
}

function updateInterim(fn) {
  if (!state.currentInterim) return;
  fn(state.currentInterim);
  const idx = state.interimReports.findIndex(r => r.id === state.currentInterim.id);
  if (idx >= 0) state.interimReports[idx] = state.currentInterim;
  saveInterimReports();
}

function renderInterimStep(step) {
  if (step === 1) renderInterimForm();
  else if (step === 2) downloadInterimPDF();
}

function setInterimPkg(key, val) {
  const ir = state.currentInterim;
  if (!ir) return;
  updateInterim(r => r.pkg[key] = (r.pkg[key] === val) ? null : val);
  // Update button states in-place without full re-render
  const newVal = state.currentInterim.pkg[key];
  const allBtns = document.querySelectorAll(`[onclick*="setInterimPkg('${key}'"]`);
  allBtns.forEach(btn => {
    const btnVal = btn.getAttribute('onclick').includes("true)");
    btn.className = 'check-btn' + (newVal === true && btnVal ? ' ok' : newVal === false && !btnVal ? ' issue' : '');
  });
}

// ── SHARED PDF DOWNLOAD ENGINE ───────────────────────────────────────
// Renders any HTML string into a hidden element, captures via html2canvas,
// and downloads as a named PDF. margin is in mm.
function _triggerPDFDownload(htmlContent, filename, margin) {
  margin = margin || 5;
  toast('⏳ PDF hazırlanıyor…', 8000);

  // Detect if htmlContent is a full HTML document or a snippet
  const isFullDoc = /<!DOCTYPE|<html/i.test(htmlContent);

  function captureAndSave(el) {
    html2canvas(el, { scale:2, useCORS:true, logging:false, backgroundColor:'#ffffff', width:794, windowWidth:794 }).then(function(canvas) {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      const contentW = pageW - margin * 2;
      const contentH = pageH - margin * 2;
      const ratio = contentW / (canvas.width / 2);
      const totalImgH = (canvas.height / 2) * ratio;
      let yOffset = 0, pageNum = 0;
      while (yOffset < totalImgH) {
        if (pageNum > 0) pdf.addPage();
        const srcY = (yOffset / ratio) * 2;
        const srcH = (contentH / ratio) * 2;
        const sliceCanvas = document.createElement('canvas');
        sliceCanvas.width = canvas.width;
        sliceCanvas.height = Math.min(srcH, canvas.height - srcY);
        sliceCanvas.getContext('2d').drawImage(canvas, 0, srcY, canvas.width, sliceCanvas.height, 0, 0, canvas.width, sliceCanvas.height);
        pdf.addImage(sliceCanvas.toDataURL('image/jpeg', 0.97), 'JPEG', margin, margin, contentW, (sliceCanvas.height / 2) * ratio);
        yOffset += contentH; pageNum++;
      }
      const url = URL.createObjectURL(pdf.output('blob'));
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
      toast('✓ ' + filename + ' indirildi');
    }).catch(function(err) {
      console.error('PDF error:', err);
      toast('❌ PDF oluşturulamadı');
    });
  }

  if (isFullDoc) {
    // Render the full HTML document in a hidden iframe so all CSS applies correctly
    const old = document.getElementById('_pdf_dl_iframe');
    if (old) old.remove();
    const iframe = document.createElement('iframe');
    iframe.id = '_pdf_dl_iframe';
    iframe.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;height:1123px;border:none;visibility:hidden;';
    document.body.appendChild(iframe);
    iframe.onload = function() {
      setTimeout(function() {
        const iDoc = iframe.contentDocument || iframe.contentWindow.document;
        captureAndSave(iDoc.body);
        setTimeout(function() { iframe.remove(); }, 6000);
      }, 800);
    };
    iframe.contentDocument.open();
    iframe.contentDocument.write(htmlContent);
    iframe.contentDocument.close();
  } else {
    // Snippet: inject into print-area div as before
    const el = document.getElementById('print-area');
    el.innerHTML = htmlContent;
    el.style.cssText = 'display:block;position:fixed;left:-9999px;top:0;width:794px;background:#fff;z-index:-1;';
    captureAndSave(el);
    setTimeout(function() { el.style.cssText = ''; }, 6000);
  }
}

function downloadInterimPDF() {
  const ir = state.currentInterim;
  if (!ir) return;
  const reportHTML = buildInterimReportHTML(ir);
  const brand = (ir.customer||'Brand').replace(/[^a-zA-Z0-9]/g,'_');
  const po    = (ir.orderno||'PO').replace(/[^a-zA-Z0-9]/g,'_');
  const filename = `${brand}_${po}_Interim_${ir.interimNo}.pdf`;
  _triggerPDFDownload(reportHTML, filename, 8);
}

async function deleteReport(id) {
  if (!confirm(t('Remove this report?\n\nMake sure you have saved the PDF first.'))) return;
  const index = state.reports.findIndex(r => r.id === id);
  if (index === -1) return;
  state.reports.splice(index, 1);
  try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.reports)); } catch (_) {}
  // Delete from Supabase too
  if (typeof sb !== 'undefined') {
    try { await sb.rest('DELETE', 'reports', null, { id: `eq.${id}` }); } catch (e) { console.warn('[AQL] Delete failed:', e.message); }
  }
  showDashboard();
}

function openReport(id) {
  const r = state.reports.find(r => r.id === id);
  if (!r) return;
  state.currentReport = r;
  downloadFinalPDF();
}

      </div>

      <button class="btn btn-ghost" onclick="showWizardStep(2)">← ${t('Back')}</button>
      <button class="btn btn-primary" onclick="showWizardStep(4)">${t('Next: Photos →')}</button>
    </div>
  `);
}

function toggleDefectExtra(code) {
  const el = qs(`#defect-extra-${code}`);
  if (el) el.style.display = el.style.display==='none' ? 'flex' : 'none';
}

function saveDefectNote(code) {
  updateReport(r => {
    if (!r.defects[code]) r.defects[code] = {maj:0,min:0};
    r.defects[code].note = qs(`#defect-note-${code}`).value;
  });
}

function saveDefectPhoto(code, input) {
  if (!input.files.length) return;
  const files  = Array.from(input.files);
  let pending  = files.length;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = async e => {
      const compressed = await compressImage(e.target.result);
      updateReport(r => {
        if (!r.defects[code]) r.defects[code] = {maj:0,min:0};
        normDefectPhotos(r.defects[code]);
        r.defects[code].photos.push(compressed);
      });
      if (--pending === 0) renderStep3(state.currentReport);
    };
    reader.onerror = () => { toast(t('⚠️ Could not read photo')); --pending; };
    reader.readAsDataURL(file);
  });
}

function removeDefectPhoto(code, idx) {
  updateReport(r => { if (r.defects[code]?.photos) r.defects[code].photos.splice(idx,1); });
  renderStep3(state.currentReport);
}

function switchDefectTab(catId) {
  state.activeDefectTab = catId;
  renderStep3(state.currentReport);
}

function changeDefect(code, type, delta) {
  updateReport(r => {
    if (!r.defects[code]) r.defects[code] = {maj:0,min:0};
    r.defects[code][type] = Math.max(0, (r.defects[code][type]||0) + delta);
  });
  const r   = state.currentReport;
  const d   = r.defects[code];
  const el  = qs(`#def-${type}-${code}`);
  if (el) { el.textContent = d[type]; el.className = d[type]>0?'nonzero':''; }
  const { maj, min } = defectTotals(r);
  const statusCls   = maj>r.majorLimit||min>r.minorLimit ? 'fail' : (maj>0||min>0 ? 'pass' : 'pending');
  const statusLabel = statusCls==='fail' ? t('✗ FAILING') : statusCls==='pass' ? t('✓ PASSING') : t('— No Defects');
  const sbEl = qs('.status-result');
  if (sbEl) { sbEl.className=`status-result ${statusCls}`; sbEl.textContent=statusLabel; }
  const majEl = qs('.status-counts .sc:first-child');
  const minEl = qs('.status-counts .sc:last-child');
  if (majEl) { majEl.className=`sc ${maj>r.majorLimit?'ov':maj>0?'warn':'ok'}`; majEl.innerHTML=`Maj: <strong>${maj}/${r.majorLimit}</strong>`; }
  if (minEl) { minEl.className=`sc ${min>r.minorLimit?'ov':min>0?'warn':'ok'}`; minEl.innerHTML=`Min: <strong>${min}/${r.minorLimit}</strong>`; }
}

    </div>

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    state.cameraStream = stream;
    const video = qs('#camera-video');
    if (video) video.srcObject = stream;
  } catch (_) {
    const preview = qs('.camera-preview');
    if (preview) preview.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:13px;text-align:center;padding:20px">${t('Camera not available.')}<br>${t('Please upload photos from your device.')}</div>`;
  }
}

function stopCamera() {
  if (state.cameraStream) { state.cameraStream.getTracks().forEach(t => t.stop()); state.cameraStream = null; }
  const video = qs('#camera-video');
  if (video) { video.pause(); video.srcObject = null; }
}

function setPhotoLabel(label) {
  state.photoLabel = label;
  document.querySelectorAll('.photo-label-btn').forEach(b => b.classList.toggle('active', b.dataset.label===label));
}

function takePhoto() {
  const video = qs('#camera-video'), canvas = qs('#snap-canvas');
  if (!video || !canvas) return;
  let w = video.videoWidth||640, h = video.videoHeight||480;
  if (w>PHOTO_MAX_DIM||h>PHOTO_MAX_DIM) {
    if (w>h) { h=Math.round(h*PHOTO_MAX_DIM/w); w=PHOTO_MAX_DIM; }
    else      { w=Math.round(w*PHOTO_MAX_DIM/h); h=PHOTO_MAX_DIM; }
  }
  canvas.width=w; canvas.height=h;
  canvas.getContext('2d').drawImage(video,0,0,w,h);
  const url = canvas.toDataURL('image/jpeg', PHOTO_QUALITY);
  stopCamera();
  addPhotoToReport(url, state.photoLabel);
  toast(t('📸 Photo saved:') + ' ' + state.photoLabel);
  setTimeout(() => startCamera(), 400);
}

function uploadPhoto(input) {
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = async e => {
      const compressed = await compressImage(e.target.result);
      addPhotoToReport(compressed, state.photoLabel);
      renderPhotoGrid();
    };
    reader.onerror = () => toast(t('⚠️ Could not read photo'));
    reader.readAsDataURL(file);
  });
}

function addPhotoToReport(url, label) {
  updateReport(r => {
    if (!r.photos) r.photos = [];
    r.photos.push({ url, label, ts: Date.now() });
  });
  renderPhotoGrid();
}

function deletePhoto(idx) {
  updateReport(r => r.photos.splice(idx, 1));
  renderPhotoGrid();
}

function renamePhoto(index, newLabel) {
  updateReport(r => { if (r.photos[index]) r.photos[index].label = newLabel; });
}

function renderPhotoGrid() {
  const grid = qs('#photo-grid');
  if (!grid) return;
  const r = state.currentReport;
  grid.innerHTML = (r.photos||[]).map((p,i) => `
    <div class="photo-thumb">
      <img src="${p.url}" alt="${p.label}">
      <div class="pt-label">
        <input value="${p.label||''}" style="background:transparent;border:none;color:#fff;font-size:10px;width:100%;text-align:center;outline:none;cursor:text"
          onchange="renamePhoto(${i},this.value)" onclick="event.stopPropagation()">
      </div>
      <button class="pt-del" onclick="deletePhoto(${i})">✕</button>
    </div>`).join('') || `<div style="color:var(--muted);font-size:13px;grid-column:1/-1;padding:20px;text-align:center">${t('No photos yet.')}</div>`;
}

// ── INTERNAL: inject snippet, open in new tab ────────────────────────
function _openWindow(printContent, inject) {
  const full = printContent.replace('</body>', inject + '</body>');
  const url  = URL.createObjectURL(new Blob([full], { type: 'text/html;charset=utf-8' }));
  const win  = window.open(url, '_blank');
  if (!win) {
    const a = document.createElement('a');
    a.href = url; a.target = '_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
  setTimeout(() => URL.revokeObjectURL(url), 120000);
}

async function uploadPendingPhotos(report) {
  let changed = false;
  const photos = (report.photos || []).slice();
  for (let i = 0; i < photos.length; i++) {
    const p = photos[i];
    if (p && p.url && p.url.startsWith('data:')) {
      try {
        photos[i] = { ...p, url: await sb.uploadPhoto(report.id, p.url) };
        changed = true;
      } catch (e) { console.warn('[AQL] Photo upload failed:', e.message); }
    }
  }
  if (changed) report.photos = photos;

  const defects = { ...(report.defects || {}) };
  for (const code of Object.keys(defects)) {
    const d = { ...defects[code] };
    const dp = (d.photos || []).slice();
    let dChanged = false;
    for (let i = 0; i < dp.length; i++) {
      if (typeof dp[i] === 'string' && dp[i].startsWith('data:')) {
        try {
          dp[i] = await sb.uploadPhoto(report.id, dp[i]);
          dChanged = true;
        } catch (e) { console.warn('[AQL] Defect photo upload failed:', e.message); }
      }
    }
    if (dChanged) { defects[code] = { ...d, photos: dp }; changed = true; }
  }
  if (changed) report.defects = defects;
  return changed;
}

async function loadPeopleFromSupabase() {
  try {
    const rows = await sb.rest('GET', 'people', null, { select: 'role,name' });
    if (rows && rows.length) {
      // Merge: start with Supabase data, then add any localStorage-only entries
      const fromSupabase = { qc: [], dept: [], qa: [], supplier: [] };
      rows.forEach(r => { if (fromSupabase[r.role]) fromSupabase[r.role].push(r.name); });
      const fromLocal = loadPeople();
      const merged = { qc: [], dept: [], qa: [], supplier: [] };
      for (const key of Object.keys(merged)) {
        const combined = [...new Set([...(fromSupabase[key]||[]), ...(fromLocal[key]||[])])];
        merged[key] = combined;
      }
      localStorage.setItem(PEOPLE_KEY, JSON.stringify(merged));
      return merged;
    }
    // Supabase returned empty — trust localStorage completely
  } catch (e) { console.warn('[AQL] People load failed:', e.message); }
  return loadPeople();
}

async function loadCustomersFromSupabase() {
  try {
    const rows = await sb.rest('GET', 'customers', null, { select: 'name', order: 'name.asc' });
    if (rows && rows.length) {
      // Merge: combine Supabase + localStorage, deduplicate, sort
      const fromSupabase = rows.map(r => r.name);
      const fromLocal = loadCustomers();
      const merged = [...new Set([...fromSupabase, ...fromLocal])].sort();
      localStorage.setItem(CUSTOMERS_KEY, JSON.stringify(merged));
      return merged;
    }
    // Supabase returned empty — trust localStorage completely
  } catch (e) { console.warn('[AQL] Customers load failed:', e.message); }
  return loadCustomers();
}

// ══ INIT ══════════════════════════════════════════════════════════
showDashboard();

// Bootstrap: load from Supabase and re-render if cloud data exists
(async function aqlSupabaseInit() {
  await loadReportsFromSupabase();
  await loadPeopleFromSupabase();
  await loadCustomersFromSupabase();
})();
