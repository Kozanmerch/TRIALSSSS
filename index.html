function newInterimReport(customer, orderno) {
  const existingCount = state.interimReports.filter(r => r.customer===customer && r.orderno===orderno).length;
  const now = new Date(), p = n => String(n).padStart(2,'0');
  return {
    id: 'INT-' + Date.now(), createdAt: new Date().toISOString(), type: 'interim',
    customer, orderno, interimNo: existingCount + 1,
    supplier: 'KOZAN', modelNo: '', size: '', colour: '', qty: '', fabricDesc: '',
    date: `${p(now.getDate())}/${p(now.getMonth()+1)}/${now.getFullYear()}`,
    time: `${p(now.getHours())}:${p(now.getMinutes())}`,
    pkg: { neckLabel:null, washLabel:null, assortHanger:null, boxLabel:null, accessory:null },
    findings: {
      fabricQuality:'', colourWingDiff:'', measurements:'', stitchQuality:'',
      skipStitchNeedle:'', oilStain:'', threadClean:'', labelPosition:'',
      symmetry:'', ironQuality:'', printEmbroidery:'', buttonHole:'', collarElasticity:'',
    },
    generalObservation: '', supervisorName: '', qcName: '', photos: [],
  };
}

function startInterimReport(customerEnc, ordernoEnc) {
  const customer = decodeURIComponent(customerEnc);
  const orderno  = decodeURIComponent(ordernoEnc);
  const ref = state.reports.find(r => r.customer===customer && r.orderno===orderno)
           || state.interimReports.find(r => r.customer===customer && r.orderno===orderno);
  const ir = newInterimReport(customer, orderno);
  if (ref) {
    ir.supplier   = ref.supplier || ir.supplier;
    ir.modelNo    = ref.styleno || ref.modelNo || '';
    ir.styleno    = ir.modelNo;
    ir.colour     = ref.colour || '';
    ir.fabricDesc = ref.fabricDesc || ref.fabric || ''; // carry fabric from in-line or final
    ir.qty        = ''; // Always start empty — user fills in the inspected qty
  }
  state.interimReports.push(ir);
  saveInterimReports().catch(e => console.warn("[AQL] saveInterimReports failed:", e.message));
  state.currentInterim = ir;
  state.screen = 'interim';
  showHomeBtn();
  renderInterimForm();
}

function openInterim(id) {
  const ir = state.interimReports.find(r => r.id === id);
  if (!ir) return;
  state.currentInterim = ir;
  state.screen = 'interim';
  showHomeBtn();
  renderInterimForm();
}

async function deleteInterim(id) {
  if (!confirm(t('Remove this interim report?\n\nMake sure you have saved the PDF first.'))) return;
  const idx = state.interimReports.findIndex(r => r.id === id);
  if (idx === -1) return;
  const { customer, orderno } = state.interimReports[idx];
  state.interimReports.splice(idx, 1);
  saveInterimReports().catch(e => console.warn("[AQL] saveInterimReports failed:", e.message));
  if (typeof sb !== 'undefined') {
    try { await sb.rest('DELETE', 'interim_reports', null, { id: `eq.${id}` }); } catch(e) { console.warn('[AQL] Delete interim failed:', e.message); }
  }
  openOrderHub(encodeURIComponent(customer), encodeURIComponent(orderno));
}

/**
 * Atomic in-line report mutation: applies fn then auto-persists.
 * @param {function} fn - Mutator function receiving the in-line report object
 */
function updateInterim(fn) {
  if (!state.currentInterim) return;
  fn(state.currentInterim);
  const idx = state.interimReports.findIndex(r => r.id === state.currentInterim.id);
  if (idx >= 0) state.interimReports[idx] = state.currentInterim;
  saveInterimReports().catch(e => console.warn("[AQL] saveInterimReports failed:", e.message));
}

function renderInterimStep(step) {
  if (step === 1) renderInterimForm();
  else if (step === 2) downloadInterimPDF();
}

function setInterimPkg(key, val) {
  const ir = state.currentInterim;
  if (!ir) return;
  updateInterim(r => r.pkg[key] = (r.pkg[key] === val) ? null : val);
  // Update button states in-place without full re-render
  const newVal = state.currentInterim.pkg[key];
  const allBtns = document.querySelectorAll(`[onclick*="setInterimPkg('${key}'"]`);
  allBtns.forEach(btn => {
    const btnVal = btn.getAttribute('onclick').includes("true)");
    btn.className = 'check-btn' + (newVal === true && btnVal ? ' ok' : newVal === false && !btnVal ? ' issue' : '');
  });
}



async function addInterimPhotos(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  // Single file → open editor for crop/rotate
  if (files.length === 1) {
    const reader = new FileReader();
    reader.onload = e => {
      camState.label  = '';   // label assigned after save in interim grid
      camState.onSave = url => {
        updateInterim(r => { if (!r.photos) r.photos = []; r.photos.push({ url, label: '' }); });
        _refreshInterimPhotoGrid();
        toast(t('📸 Photo saved'));
      };
      editorOpen(e.target.result);
    };
    reader.readAsDataURL(files[0]);
    return;
  }
  // Multiple files → add directly, no processing
  for (const file of files) {
    const reader = new FileReader();
    await new Promise(resolve => {
      reader.onload = e => {
        updateInterim(r => { if (!r.photos) r.photos = []; r.photos.push({ url: e.target.result, label: '' }); });
        resolve();
      };
      reader.readAsDataURL(file);
    });
  }
  _refreshInterimPhotoGrid();
  toast(`📸 ${files.length} ${t('photo(s) added')||'photo(s) added'}`);
}

function deleteInterimPhoto(idx) {
  updateInterim(r => { if (r.photos) r.photos.splice(idx, 1); });
  _refreshInterimPhotoGrid();
}

/**
 * Opens the photo editor for an already-saved in-line report photo.
 * On save, replaces the photo in-place at the same index.
 * @param {number} idx - Index in ir.photos array
 */
function editInterimPhoto(idx) {
  const ir = state.currentInterim;
  if (!ir || !ir.photos || !ir.photos[idx]) return;
  camState.label  = ir.photos[idx].label || '';
  camState.onSave = url => {
    updateInterim(r => { r.photos[idx] = { ...r.photos[idx], url }; });
    _refreshInterimPhotoGrid();
  };
  editorOpen(ir.photos[idx].url);
}

function updateInterimPhotoLabel(idx, val) {
  updateInterim(r => { if (r.photos && r.photos[idx]) r.photos[idx].label = val; });
}

function _refreshInterimPhotoGrid() {
  const ir = state.currentInterim;
  const grid = qs('#interim-photo-grid');
  if (!grid || !ir) return;
  grid.innerHTML = (ir.photos||[]).map((p,i)=>`
    <div class="photo-thumb" style="position:relative">
      <img src="${p.url||p}" onerror="this.style.display='none'">
      <button class="pt-edit" onclick="editInterimPhoto(${i})" title="Edit">✏</button>
      <input value="${esc((p.label||''))}" placeholder="" oninput="updateInterimPhotoLabel(${i},this.value)"
        style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);color:#fff;border:none;font-size:10px;padding:2px 4px;text-align:center;outline:none;width:100%;box-sizing:border-box">
      <button class="pt-del" onclick="deleteInterimPhoto(${i})">✕</button>
    </div>`).join('') +
  `<label style="aspect-ratio:1;border-radius:var(--r-sm);border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:4px;color:var(--muted);font-size:12px">
    <span style="font-size:24px">+</span>
    <span>${t('Add Photo')}</span>
    <input type="file" accept="image/*" multiple style="display:none" onchange="addInterimPhotos(this)">
  </label>`;
}


// IMPORTANT: Print layout is sensitive — avoid changing widths/heights
// without testing PDF export on A4 portrait (210mm).
/**
 * Builds the full A4 HTML document for the In-Line (Ara Kontrol) Report PDF.
 * Page 1: header, order info, packaging table, control criteria, notes, signatures.
 * Page 2: photos.
 * @param {Object} ir - In-line report object
 * @returns {string} Full HTML document string
 */
function buildInterimReportHTML(ir) {
  const logoSrc = typeof KOZAN_JPEG_LOGO !== 'undefined' ? KOZAN_JPEG_LOGO : '';
  const logoHTML = logoSrc
    ? `<img src="${logoSrc}" style="height:40px;width:auto;display:block;-webkit-print-color-adjust:exact;print-color-adjust:exact">`
    : `<div style="font-size:14px;font-weight:900;border:2px solid #333;padding:3px 7px;font-family:monospace">KT</div>`;

  const pkgRowsHTML = INTERIM_PKG_ITEMS.map(item => {
    const val = ir.pkg[item.key] || '';
    return `<tr>
      <td style="font-size:8px;padding:3px 5px;border:1px solid #ccc;width:35%">${item.en}</td>
      <td style="font-size:8.5px;padding:3px 5px;border:1px solid #ccc;color:#111">${val || '<span style="color:#ccc">—</span>'}</td>
    </tr>`;
  }).join('');

  const ctrlRowsHTML = INTERIM_CTRL_ITEMS.map(item => {
    const finding = ir.findings[item.key] || '';
    return `<tr>
      <td style="font-size:8px;padding:3px 5px;border:1px solid #ccc;width:35%">${item.en}</td>
      <td style="font-size:8.5px;padding:3px 5px;border:1px solid #ccc;color:#111;line-height:1.4">${finding || '<span style="color:#ccc">—</span>'}</td>
    </tr>`;
  }).join('');

  const photos = ir.photos || [];
  // Build photo pages: 2 cols × 3 rows = 6 per page, aspect ratio preserved, nothing cropped
  const PER_PAGE_INTERIM = 6;
  let interimPhotoPages = '';
  if (photos.length) {
    for (let start = 0; start < photos.length; start += PER_PAGE_INTERIM) {
      const chunk = photos.slice(start, start + PER_PAGE_INTERIM);
      const header = start === 0
        ? '<div class="section-bar" style="margin-bottom:8px">FOTOĞRAFLAR · PHOTOS (' + photos.length + ')</div>'
        : '';
      interimPhotoPages += '<div class="pdf-page" style="break-inside:avoid;page-break-inside:avoid">' + header +
        '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">' +
        chunk.map(p =>
          '<div style="border:1px solid #ccc;border-radius:6px;overflow:hidden;background:#f9f9f9;display:flex;flex-direction:column;break-inside:avoid;page-break-inside:avoid">' +
            '<div style="width:100%;height:240px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#f9f9f9">' +
              '<img src="' + (p.url||p) + '" style="max-width:100%;max-height:240px;width:auto;height:auto;display:block;object-fit:contain">' +
            '</div>' +
            (p.label ? '<div style="font-size:9px;font-weight:700;color:#374151;text-align:center;padding:3px 4px;background:#f0f0f0;border-top:1px solid #ddd;width:100%">' + p.label + '</div>' : '') +
          '</div>'
        ).join('') +
        '</div></div>';
    }
  } else {
    interimPhotoPages = `
  <div class="pdf-page">
    <div class="section-bar" style="margin-bottom:8px">FOTOĞRAFLAR · PHOTOS (0)</div>
    <div style="color:#bbb;font-size:10px;text-align:center;padding:40px 0">${t('No photos added')}</div>
  </div>`;
  }

  const styleno = ir.styleno || ir.modelNo || '—';

  return `<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',Arial,sans-serif; font-size:8.5px; color:#111; background:#fff; }
  table { border-collapse:collapse; width:100%; table-layout:fixed; }
  td,th { border:1px solid #ccc; vertical-align:top; padding:0; overflow:hidden; word-break:break-word; }
  .section-bar { background:#A6A6A6; color:#000; font-size:8px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; padding:3px 6px; text-indent:1em; }
  .info-cell { padding:3px 5px; text-indent:0.5em; }
  .info-cell label { display:block; font-size:6.5px; color:#888; text-transform:uppercase; letter-spacing:0.04em; }
  .info-cell span { font-size:8.5px; font-weight:500; }
  th { background:#d4d4d4; font-size:7.5px; padding:2px 4px; text-align:left; }
  html, body { width:210mm; margin:0 auto; padding:0; }
  .pdf-page {
    width:210mm; padding:5mm; box-sizing:border-box; background:#fff;
    page-break-after:always; break-after:page;
    display:flex; flex-direction:column; min-height:277mm;
  }
  .pdf-page:last-child { page-break-after:auto; break-after:auto; }
  .page-body { flex:1; }
  .page-footer { margin-top:auto; padding-top:4px; }
</style>
</head><body>

  <div style="text-align:center">
    <div style="font-size:11px;font-weight:700;letter-spacing:0.05em;color:#374151">ARA KONTROL / IN-LINE RAPORU</div>
    <div style="font-size:7.5px;color:#888;letter-spacing:0.03em">In-Line Control Report · #${ir.interimNo}</div>
  </div>
  <div style="text-align:right;font-size:8px;color:#555;line-height:1.8">
    <div><b>TARİH:</b> ${ir.date||'—'}</div>

</div>

<table style="margin-bottom:2px;table-layout:fixed;width:100%;border-collapse:collapse">

    <td style="width:20%;border:1px solid #d4d4d4"><div class="info-cell"><label>İmalatçı · Manufacturer</label><span>${ir.supplier||'KOZAN'}</span></div></td>

// ══════════════════════════════════════════════════════════════════════
// PDF EXPORT ENGINE
// IMPORTANT: Per-page capture — each .pdf-page div is captured as a
// separate image then added as its own jsPDF page.
// ⚠️  Do NOT switch back to the "slice one tall canvas" approach —
//     it causes content to split mid-element across page boundaries.
// ⚠️  Keep iframe width at 794px (≈ A4 at 96dpi) and wait ≥1000ms
//     for fonts/images to load before capturing.
// ══════════════════════════════════════════════════════════════════════
// ── SHARED PDF DOWNLOAD ENGINE ───────────────────────────────────────
// Renders HTML into a hidden iframe. Text/layout pages use html2canvas.
// Photo pages inject images directly into jsPDF at full quality — no screenshot degradation.
function _triggerPDFDownload(htmlContent, filename, margin) {
  margin = margin || 5;
  toast('⏳ PDF hazırlanıyor…', 8000);

  const old = document.getElementById('_pdf_dl_iframe');
  if (old) old.remove();
  const iframe = document.createElement('iframe');
  iframe.id = '_pdf_dl_iframe';
  iframe.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;height:5000px;border:none;visibility:hidden;';
  document.body.appendChild(iframe);

  iframe.onload = function() {
    setTimeout(async function() {
      const iDoc = iframe.contentDocument || iframe.contentWindow.document;
      const pages = iDoc.querySelectorAll('.pdf-page');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
      const pageW   = pdf.internal.pageSize.getWidth();
      const pageH   = pdf.internal.pageSize.getHeight();
      const contentW = pageW - margin * 2;
      const contentH = pageH - margin * 2;

      // A page is a "photo page" if it contains the photo section bar or multiple large images
      function isPhotoPage(pg) {
        const bar = pg.querySelector('.section-bar');
        if (bar && (bar.textContent.includes('PHOTO') || bar.textContent.includes('FOTOĞRAF'))) return true;
        // Also detect by counting large data-URI images (more than 1 means it's a photo grid, not just a logo)
        const largeImgs = Array.from(pg.querySelectorAll('img')).filter(
          img => img.src && img.src.length > 5000 && img.naturalWidth > 200
        );
        return largeImgs.length > 1;
      }

      // Inject photos directly into jsPDF — bypasses html2canvas entirely
      async function renderPhotoPageDirect(pg, isFirst) {
        if (!isFirst) pdf.addPage();

        // Render any section-bar header text via html2canvas (tiny, no quality loss)
        const bar = pg.querySelector('.section-bar');
        const barH = bar ? 7 : 0;
        if (bar) {
          const bc = await html2canvas(bar, { scale:2, useCORS:true, logging:false, backgroundColor:'#A6A6A6', width:794, windowWidth:794 });
          pdf.addImage(bc.toDataURL('image/jpeg', 0.95), 'JPEG', margin, margin, contentW, barH);
        }

        const photos = Array.from(pg.querySelectorAll('img')).filter(
          img => img.src && img.src.length > 5000 && img.naturalWidth > 200
        );

        const cols   = 2;
        const gap    = 3;
        const cellW  = (contentW - gap) / cols;
        const cellH  = 86;
        const startY = margin + barH + (bar ? 2 : 0);

        photos.forEach((img, i) => {
          const col = i % cols;
          const row = Math.floor(i / cols);
          const x   = margin + col * (cellW + gap);
          const y   = startY + row * (cellH + gap);

          // Cell border
          pdf.setDrawColor(200, 200, 200);
          pdf.setLineWidth(0.2);
          pdf.rect(x, y, cellW, cellH);

          // Fit image preserving aspect ratio
          const iw = img.naturalWidth  || 1;
          const ih = img.naturalHeight || 1;
          const photoH = cellH - 7; // reserve bottom for label
          const scale  = Math.min(cellW / iw, photoH / ih);
          const dw = iw * scale;
          const dh = ih * scale;
          const dx = x + (cellW - dw) / 2;
          const dy = y + (photoH - dh) / 2;

          try {
            const fmt = img.src.startsWith('data:image/png') ? 'PNG' : 'JPEG';
            pdf.addImage(img.src, fmt, dx, dy, dw, dh);
          } catch(e) { console.warn('[AQL] Photo embed failed:', e); }

          // Label text at bottom of cell — find it within the same grid cell as the image
          const cellContainer = img.closest('div[style*="flex-direction:column"], div[style*="flex-direction: column"]');
          const labelEl = cellContainer && cellContainer.querySelector('div[style*="background:#f0f0f0"], div[style*="background:#F0F0F0"]');
          const label   = labelEl ? labelEl.textContent.trim() : '';
          if (label) {
            pdf.setFontSize(6.5);
            pdf.setTextColor(80, 80, 80);
            pdf.text(label, x + cellW / 2, y + cellH - 1.5, { align:'center', maxWidth: cellW - 2 });
          }
        });
      }

      if (!pages || pages.length === 0) {
        const canvas = await html2canvas(iDoc.body, { scale:2, useCORS:true, logging:false, backgroundColor:'#ffffff', width:794, windowWidth:794 });
        const imgH = (canvas.height / 2) * (contentW / (canvas.width / 2));
        pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', margin, margin, contentW, Math.min(imgH, contentH));
        _finishPDF(pdf, filename, iframe);
        return;
      }

      let isFirst = true;
      for (let idx = 0; idx < pages.length; idx++) {
        const pg = pages[idx];
        try {
          if (isPhotoPage(pg)) {
            await renderPhotoPageDirect(pg, isFirst);
          } else {
            const canvas = await html2canvas(pg, { scale:2, useCORS:true, logging:false, backgroundColor:'#ffffff', width:794, windowWidth:794 });
            if (!isFirst) pdf.addPage();
            const imgH = (canvas.height / 2) * (contentW / (canvas.width / 2));
            pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', margin, margin, contentW, Math.min(imgH, contentH));
          }
        } catch(err) { console.error('PDF page error:', err); }
        isFirst = false;
      }
      _finishPDF(pdf, filename, iframe);

    }, 1000);
    setTimeout(function() { if (iframe.parentNode) iframe.remove(); }, 30000);
  };

  iframe.contentDocument.open();
  iframe.contentDocument.write(htmlContent);
  iframe.contentDocument.close();
}

function _finishPDF(pdf, filename, iframe) {
  const url = URL.createObjectURL(pdf.output('blob'));
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
  toast('✓ ' + filename + ' indirildi');
  if (iframe && iframe.parentNode) iframe.remove();
}

function downloadInterimPDF() {
  const ir = state.currentInterim;
  if (!ir) return;
  const reportHTML = buildInterimReportHTML(ir);
  const brand = (ir.customer||'Brand').replace(/[^a-zA-Z0-9]/g,'_');
  const po    = (ir.orderno||'PO').replace(/[^a-zA-Z0-9]/g,'_');
  const filename = (ir.orderno||'ORDER').replace(/[^a-zA-Z0-9\-_]/g,'_') + '_ARAKONTROL' + (ir.interimNo||1) + '.pdf';
  _triggerPDFDownload(reportHTML, filename, 8);
}

async function deleteReport(id) {
  if (!confirm(t('Remove this report?\n\nMake sure you have saved the PDF first.'))) return;
  const index = state.reports.findIndex(r => r.id === id);
  if (index === -1) return;
  const { customer, orderno } = state.reports[index];
  state.reports.splice(index, 1);
  try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.reports)); } catch (_) {}
  // Delete from Supabase too
  if (typeof sb !== 'undefined') {
    try { await sb.rest('DELETE', 'reports', null, { id: `eq.${id}` }); } catch (e) { console.warn('[AQL] Delete failed:', e.message); }
  }
  openOrderHub(encodeURIComponent(customer), encodeURIComponent(orderno));
}

function openReport(id) {
  const r = state.reports.find(r => r.id === id);
  if (!r) return;
  state.currentReport = r;
  state.screen = 'wizard';
  state.wizardStep = 1;
  showHomeBtn();
  showWizardStep(1);
}

// ACTION SHEET — Edit or Download from dashboard
// ══════════════════════════════════════════════════════════════════════
let _actionSheetType = null; // 'final' | 'interim'
let _actionSheetId   = null;

function showReportActions(type, id) {
  _actionSheetType = type;
  _actionSheetId   = id;
  const overlay = document.getElementById('action-sheet-overlay');
  const sheet   = document.getElementById('action-sheet');
  const title   = document.getElementById('action-sheet-title');
  if (type === 'interim') {
    const ir = state.interimReports.find(r => r.id === id);
    title.textContent = ir ? `In-Line #${ir.interimNo||1}` : 'In-Line Report';
  } else {
    const r = state.reports.find(r => r.id === id);
    title.textContent = r ? `Final #${r.finalInspectionNo||1} · ${r.customer||''}` : 'Final Report';
  }
  // Update button labels through translation
  document.querySelector('#action-edit-btn .as-main').textContent    = t('Edit Report');
  document.querySelector('#action-edit-btn .as-sub').textContent     = t('Open and modify this report');
  document.querySelector('#action-download-btn .as-main').textContent = t('Download PDF');
  document.querySelector('#action-download-btn .as-sub').textContent  = t('Export this report as a PDF file');
  document.getElementById('action-cancel-btn').textContent            = t('Cancel');
  overlay.style.display = 'block';
  sheet.style.display   = 'block';
  sheet.style.transform = 'translateY(100%)';
  sheet.style.transition = 'transform 0.25s ease';
  requestAnimationFrame(() => { sheet.style.transform = 'translateY(0)'; });
}

function closeActionSheet() {
  const overlay = document.getElementById('action-sheet-overlay');
  const sheet   = document.getElementById('action-sheet');
  sheet.style.transform = 'translateY(100%)';
  setTimeout(() => {
    overlay.style.display = 'none';
    sheet.style.display   = 'none';
    _actionSheetType = null;
    _actionSheetId   = null;
  }, 220);
}

function actionSheetEdit() {
  const type = _actionSheetType;
  const id   = _actionSheetId;
  closeActionSheet();
  setTimeout(() => {
    if (type === 'interim') openInterim(id);
    else openReport(id);
  }, 230);
}

async function actionSheetDownload() {
  const type = _actionSheetType;
  const id   = _actionSheetId;
  closeActionSheet();
  if (type === 'interim') {
    const ir = state.interimReports.find(r => r.id === id);
    if (!ir) return;
    const prev = state.currentInterim;
    state.currentInterim = ir;
    await downloadInterimPDF();
    state.currentInterim = prev;
  } else {
    const r = state.reports.find(rep => rep.id === id);
    if (!r) return;
    const prev = state.currentReport;
    state.currentReport = r;
    await downloadFinalPDF();
    state.currentReport = prev;
  }
}

function addPerson(key) {
  const input = qs(`#add-${key}`);
  const name  = (input?.value||'').trim();

  const p = state.people;
  if (!p[key]) p[key] = [];
  if (p[key].includes(name)) { toast(t('Name already exists')); return; }
  p[key].push(name);
  savePeople(p);
  toast(`${t('✓ Added:')} ${name}`);

// WIZARD SHELL
// ══════════════════════════════════════════════════════════════════════


function stepsHTML(current) {
  return `<div class="steps">${STEP_LABELS.map((l,i) => {
    const n = i+1, cls = n<current?'done':n===current?'active':'', icon = n<current?'✓':n;
    return `${i>0?'<span class="step-arrow">›</span>':''}<div class="step-item ${cls}"><div class="step-num">${icon}</div>${t(l)}</div>`;
  }).join('')}</div>`;
}

function showWizardStep(step) {
  state.wizardStep = step;
  const r = state.currentReport;
  if (!r) return;
  if (step===1) renderStep1(r);
  else if (step===2) renderStep2(r);
  else if (step===3) renderStep3(r);
  else if (step===4) renderStep4(r);
  else if (step===5) renderStep5(r);
  else if (step===6) renderStep6(r);
}

// STEP 1: ORDER INFO
// ══════════════════════════════════════════════════════════════════════

function customerOpts(selected) {
  const list = state.customers;
  const opts = [`<option value="">${t('— Select Customer —')}</option>`];
  list.forEach(name => opts.push(`<option value="${esc(name)}" ${name===selected?'selected':''}>${name}</option>`));
  if (selected && !list.includes(selected)) opts.push(`<option value="${esc(selected)}" selected>${selected}</option>`);
  return opts.join('');
}

function renderStep1(r) {
  render(`
    ${stepsHTML(1)}
    <div class="card-title" style="margin-bottom:12px">${t('Order Information · Sipariş Bilgileri')}</div>
    <div class="grid-2">
      <div class="field"><label>${t('Customer · Müşteri')}</label><select id="f-customer">${customerOpts(r.customer)}</select></div>
      <div class="field"><label>${t('Order No · Sipariş No')}</label><input id="f-orderno" value="${esc(r.orderno||'')}" placeholder=""></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>${t('Order Qty · Sipariş Adedi')}</label><input id="f-orderqty" type="number" value="${r.orderqty||''}" placeholder=""></div>
      <div class="field"><label>${t('Shipping Qty · Yükleme Adedi')}</label><input id="f-shipqty" type="number" value="${r.shipqty||''}" placeholder=""></div>
    </div>
    <div class="field"><label>${t('Supplier · Tedarikçi')}</label><input id="f-supplier" value="${esc(r.supplier||'')}" placeholder=""></div>
    <div class="field"><label>${t('Style No')}</label><input id="f-styleno" value="${esc(r.styleno||'')}" placeholder=""></div>
    <div class="grid-2">
      <div class="field"><label>${t('Description · Malın Tanımı')}</label><input id="f-desc" value="${esc(r.description||'')}" placeholder=""></div>
      <div class="field"><label>${t('Colour · Renk')}</label><input id="f-colour" value="${esc(r.colour||'')}" placeholder=""></div>
    </div>
    <div class="field"><label>${t('Fabric · Kumaş')}</label><input id="f-fabric" value="${esc(r.fabric||'')}" placeholder=""></div>
    <div class="grid-3">
      <div class="field"><label>${t('Shipping Date · Yükleme Tarihi')}</label><input id="f-shipdate" type="text" value="${r.shipdate||''}" placeholder="" maxlength="10" oninput="formatShipDate(this)"></div>
      <div class="field"><label>${t('Insp. Start · Başlangıç')}</label><input id="f-inspstart" type="datetime-local" value="${r.inspstart||''}"></div>
      <div class="field"><label>${t('Insp. Finish · Bitiş')}</label><input id="f-inspfinish" type="datetime-local" value="${r.inspfinish||''}"></div>
    </div>
    <div class="spacer"></div>
    <div class="bottom-nav">
      <button class="btn btn-ghost" onclick="showDashboard()">${t('Cancel')}</button>
      <button class="btn btn-primary" onclick="saveStep1()">${t('Next: AQL Setup →')}</button>
    </div>
  `);
}

function saveStep1() {
  if (!qs('#f-customer').value || !qs('#f-orderno').value) { toast(t('Please fill in Customer and Order No')); return; }
  const prevQty = state.currentReport?.orderqty || 0;
  updateReport(r => {
    r.customer = qs('#f-customer').value; r.orderno   = qs('#f-orderno').value;
    r.orderqty  = parseInt(qs('#f-orderqty').value)||0; r.shipqty  = parseInt(qs('#f-shipqty').value)||0;
    r.supplier  = qs('#f-supplier').value; r.styleno   = qs('#f-styleno').value;
    r.description = qs('#f-desc').value;  r.colour    = qs('#f-colour').value;
    r.fabric    = qs('#f-fabric').value;  r.shipdate  = qs('#f-shipdate').value;
    r.inspstart = qs('#f-inspstart').value; r.inspfinish = qs('#f-inspfinish').value;
    // Recalculate AQL limits if order qty changed
    const newQty = parseInt(qs('#f-orderqty').value)||0;
    if (newQty !== prevQty) {
      const limits = getAQLLimits(newQty || 5000, r.aqlLevel || '1.5');
      r.sampleQty     = limits.sampleQty;
      r.majorLimit    = limits.major;
      r.minorLimit    = limits.minor;
      r.criticalLimit = limits.critical;
      r.piecesChecked = limits.sampleQty;
    }
  });
  showWizardStep(2);
}

// ══════════════════════════════════════════════════════════════════════
// STEP 2: AQL SETUP
// ══════════════════════════════════════════════════════════════════════

function renderStep2(r) {
  const qty = r.orderqty || 5000;
  const currentLevel = r.aqlLevel || '1.5';
  // Always recalculate from current qty so returning from step 1 gives fresh values
  const limits = getAQLLimits(qty, currentLevel);
  const aqlOptions = [
    {level:'1.0', label:'AQL 1.0 — Tightest', desc:'Strictest inspection. Used for high-risk or premium products.'},
    {level:'1.5', label:'AQL 1.5 — Tight',    desc:'Tight standard. Suitable for branded apparel and accessories.'},
    {level:'2.5', label:'AQL 2.5 — Standard', desc:'Industry standard for most garment inspections.'},
    {level:'4.0', label:'AQL 4.0 — Relaxed',  desc:'More lenient. Used for basic commodities or replenishment orders.'},
  ];
  render(`
    ${stepsHTML(2)}
    <div class="card-title" style="margin-bottom:12px">${t('Choose AQL Level')}</div>
    <div id="aql-options">
      ${aqlOptions.map(o => `
        <div class="aql-option ${currentLevel===o.level?'selected':''}" onclick="selectAQL(event,'${o.level}')">
          <div class="ao-radio"></div>
          <div class="ao-body"><h3>${t(o.label)}</h3><p>${t(o.desc)}</p></div>
        </div>`).join('')}
    </div>
    <div class="aql-summary" id="aql-summary">
      <div class="as-item"><label>${t('Sample Size')}</label><span id="as-sample">${limits.sampleQty}</span></div>
      <div class="as-item"><label>Critical ≤</label><span id="as-critical">${limits.critical}</span></div>
      <div class="as-item"><label>Major ≤</label><span id="as-major">${limits.major}</span></div>
      <div class="as-item"><label>Minor ≤</label><span id="as-minor">${limits.minor}</span></div>
    </div>
    <div class="divider"></div>
    <div class="field"><label>${t('Custom Sample Size (optional override)')}</label><input id="f-pieceschecked" type="number" value="${r.piecesChecked||limits.sampleQty}" placeholder=""></div>
    <div class="spacer"></div>
    <div class="bottom-nav">
      <button class="btn btn-ghost" onclick="showWizardStep(1)">← ${t('Back')}</button>
      <button class="btn btn-primary" onclick="saveStep2()">${t('Next: Enter Defects →')}</button>
    </div>
  `);
}

function selectAQL(event, level) {
  updateReport(r => { r.aqlLevel = level; });
  const limits = getAQLLimits(state.currentReport.orderqty||5000, level);
  document.querySelectorAll('.aql-option').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  qs('#as-sample').textContent   = limits.sampleQty;
  qs('#as-critical').textContent = limits.critical;
  qs('#as-major').textContent    = limits.major;
  qs('#as-minor').textContent    = limits.minor;
}

function saveStep2() {
  const r = state.currentReport;
  const limits = getAQLLimits(r.orderqty||5000, r.aqlLevel||'1.5');
  updateReport(r => {
    r.sampleQty      = limits.sampleQty;
    r.criticalLimit  = limits.critical;
    r.majorLimit     = limits.major;
    r.minorLimit     = limits.minor;
    r.piecesChecked  = parseInt(qs('#f-pieceschecked').value) || limits.sampleQty;
  });
  showWizardStep(3);
}

// ══════════════════════════════════════════════════════════════════════
// STEP 3: DEFECTS
// ══════════════════════════════════════════════════════════════════════

function renderStep3(r) {
  const { maj, min, crit } = defectTotals(r);
  const statusCls   = crit>0||maj>r.majorLimit||min>r.minorLimit ? 'fail' : (maj>0||min>0 ? 'pass' : 'pending');
  const statusLabel = statusCls==='fail' ? t('✗ FAILING') : statusCls==='pass' ? t('✓ PASSING') : t('— No Defects');
  const tabs = DEFECT_CATEGORIES.map(c =>
    `<button class="tab-btn ${c.id===state.activeDefectTab?'active':''}" onclick="switchDefectTab('${c.id}')">${t(c.label)}</button>`
  ).join('');
  const cat = DEFECT_CATEGORIES.find(c => c.id===state.activeDefectTab) || DEFECT_CATEGORIES[0];
  const itemsHTML = cat.items.map(item => {
    const d = normDefectPhotos(r.defects[item.code] || {maj:0,min:0,note:'',photos:[]});
    const hasExtra = d.note || d.photos.length > 0;
    const photosHTML = d.photos.map((src,idx) => `
      <div style="position:relative;display:inline-block">
        <img src="${src}" style="height:64px;width:64px;object-fit:cover;border-radius:6px;border:1px solid var(--border2)">
        <button onclick="removeDefectPhoto('${item.code}',${idx})" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--fail);border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">✕</button>
      </div>`).join('');
    return `<div class="defect-item">
      <div class="defect-code">${item.code}</div>
      <div class="defect-name">${item.en}<small>${item.tr}</small></div>
      <div class="defect-counters">
        <div class="counter-group"><label>${t('Major')}</label>
          <div class="counter-ctrl">
            <button onclick="changeDefect('${item.code}','maj',-1)">−</button>
            <span class="${d.maj>0?'nonzero':''}" id="def-maj-${item.code}">${d.maj}</span>
            <button onclick="changeDefect('${item.code}','maj',1)">+</button>
          </div>
        </div>
        <div class="counter-group"><label>${t('Minor')}</label>
          <div class="counter-ctrl">
            <button onclick="changeDefect('${item.code}','min',-1)">−</button>
            <span class="${d.min>0?'nonzero':''}" id="def-min-${item.code}">${d.min}</span>
            <button onclick="changeDefect('${item.code}','min',1)">+</button>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" style="margin-left:4px;font-size:14px;padding:5px 8px" onclick="toggleDefectExtra('${item.code}')" title="Add note/photo">${hasExtra?'📎✓':'📎'}</button>
      </div>
      <div id="defect-extra-${item.code}" style="display:${hasExtra?'flex':'none'};flex-direction:column;gap:6px;width:100%;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
        <textarea id="defect-note-${item.code}" placeholder="" style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px;font-family:inherit;font-size:13px;color:var(--text);resize:vertical;min-height:50px;outline:none" oninput="saveDefectNote('${item.code}')">${d.note||''}</textarea>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          ${photosHTML}
          <label style="font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border2);padding:6px 12px;border-radius:6px;flex-shrink:0">
            ${t('📷 Add Photo')}
            <input type="file" accept="image/*" multiple style="display:none" onchange="saveDefectPhoto('${item.code}',this)">
          </label>
        </div>
      </div>
    </div>`;
  }).join('');
  render(`
    <div class="status-bar">
      <div class="status-result ${statusCls}">${statusLabel}</div>
      <div class="status-counts">
        <div class="sc ${maj>r.majorLimit?'ov':maj>0?'warn':'ok'}">Maj: <strong>${maj}/${r.majorLimit}</strong></div>
        <div class="sc ${min>r.minorLimit?'ov':min>0?'warn':'ok'}">Min: <strong>${min}/${r.minorLimit}</strong></div>
      </div>
    </div>
    ${stepsHTML(3)}
    <div class="card-title" style="margin-bottom:10px">${t('Defects Found · Bulunan Hatalar')}</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${t('Tap 📎 on any defect to add a note or photo.')}</div>
    <div class="section-tabs">${tabs}</div>
    <div id="defect-list">${itemsHTML}</div>
    <div class="spacer"></div>
    <div class="bottom-nav">
      <button class="btn btn-ghost" onclick="showWizardStep(2)">← ${t('Back')}</button>
      <button class="btn btn-primary" onclick="showWizardStep(4)">${t('Next: Photos →')}</button>
    </div>
  `);
}

function toggleDefectExtra(code) {
  const el = qs(`#defect-extra-${code}`);
  if (el) el.style.display = el.style.display==='none' ? 'flex' : 'none';
}

function saveDefectNote(code) {
  updateReport(r => {
    if (!r.defects[code]) r.defects[code] = {maj:0,min:0};
    r.defects[code].note = qs(`#defect-note-${code}`).value;
  });
}

function saveDefectPhoto(code, input) {
  if (!input.files.length) return;
  const files  = Array.from(input.files);
  let pending  = files.length;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      updateReport(r => {
        if (!r.defects[code]) r.defects[code] = {maj:0,min:0};
        normDefectPhotos(r.defects[code]);
        r.defects[code].photos.push(e.target.result);
      });
      if (--pending === 0) renderStep3(state.currentReport);
    };
    reader.onerror = () => { toast(t('⚠️ Could not read photo')); --pending; };
    reader.readAsDataURL(file);
  });
}

function removeDefectPhoto(code, idx) {
  updateReport(r => { if (r.defects[code]?.photos) r.defects[code].photos.splice(idx,1); });
  renderStep3(state.currentReport);
}

function switchDefectTab(catId) {
  state.activeDefectTab = catId;
  renderStep3(state.currentReport);
}

function changeDefect(code, type, delta) {
  updateReport(r => {
    if (!r.defects[code]) r.defects[code] = {maj:0,min:0};
    r.defects[code][type] = Math.max(0, (r.defects[code][type]||0) + delta);
  });
  const r   = state.currentReport;
  const d   = r.defects[code];
  const el  = qs(`#def-${type}-${code}`);
  if (el) { el.textContent = d[type]; el.className = d[type]>0?'nonzero':''; }
  const { maj, min, crit } = defectTotals(r);
  const statusCls   = crit>0||maj>r.majorLimit||min>r.minorLimit ? 'fail' : (maj>0||min>0 ? 'pass' : 'pending');
  const statusLabel = statusCls==='fail' ? t('✗ FAILING') : statusCls==='pass' ? t('✓ PASSING') : t('— No Defects');
  const sbEl = qs('.status-result');
  if (sbEl) { sbEl.className=`status-result ${statusCls}`; sbEl.textContent=statusLabel; }
  const majEl = qs('.status-counts .sc:first-child');
  const minEl = qs('.status-counts .sc:last-child');
  if (majEl) { majEl.className=`sc ${maj>r.majorLimit?'ov':maj>0?'warn':'ok'}`; majEl.innerHTML=`Maj: <strong>${maj}/${r.majorLimit}</strong>`; }
  if (minEl) { minEl.className=`sc ${min>r.minorLimit?'ov':min>0?'warn':'ok'}`; minEl.innerHTML=`Min: <strong>${min}/${r.minorLimit}</strong>`; }
}

// ══════════════════════════════════════════════════════════════════════
// STEP 4: PHOTOS
// ══════════════════════════════════════════════════════════════════════

function camOpenFinalPhoto() {
  camOpen(url => {
    addPhotoToReport(url, state.photoLabel);
    renderStep4(state.currentReport);
    toast(t('📸 Photo saved:') + ' ' + state.photoLabel);
  }, state.photoLabel);
}

function renderStep4(r) {
  const photosHTML = (r.photos||[]).map((p,i) => `
    <div class="photo-thumb">
      <img src="${p.url}" alt="${p.label}">
      <button class="pt-edit" onclick="editPhoto(${i})" title="Edit">✏</button>
      <div class="pt-label">
        <input value="${esc(p.label||'')}" style="background:transparent;border:none;color:#fff;font-size:10px;width:100%;text-align:center;outline:none;cursor:text"
          oninput="renamePhoto(${i},this.value)" onclick="event.stopPropagation()">
      </div>
      <button class="pt-del" onclick="deletePhoto(${i})">✕</button>
    </div>`).join('');
  render(`
    ${stepsHTML(4)}
    <div class="card-title" style="margin-bottom:10px">${t('Photo Documentation')}</div>
    <div class="card" style="margin-bottom:12px">
      <div class="card-title" style="margin-bottom:8px">${t('Label for next photo:')}</div>
      <div class="photo-label-select" id="label-btns">
        ${PHOTO_LABELS.map(l => `<button class="photo-label-btn ${l===state.photoLabel?'active':''}" data-label="${l}" onclick="setPhotoLabel('${l}')">${t(l)}</button>`).join('')}
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <button class="btn btn-primary" style="flex:1;padding:14px;font-size:15px" onclick="camOpenFinalPhoto()">📷 ${t('Open Camera')}</button>
      <label class="btn btn-ghost" style="flex:1;padding:14px;cursor:pointer;text-align:center;font-size:15px">
        📁 ${t('Upload Photos')}
        <input type="file" accept="image/*" multiple style="display:none" onchange="uploadPhoto(this)">
      </label>
    </div>
    <div class="card-title" style="margin-bottom:4px">${t('Photos')} (${(r.photos||[]).length})</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${t('Tap a photo label to rename it.')}</div>
    <div class="photo-grid" id="photo-grid">${photosHTML || `<div style="color:var(--muted);font-size:13px;grid-column:1/-1;padding:20px;text-align:center">${t('No photos yet. Use the camera or upload images.')}</div>`}</div>
    <div class="spacer"></div>
    <div class="bottom-nav">
      <button class="btn btn-ghost" onclick="showWizardStep(3)">← ${t('Back')}</button>
      <button class="btn btn-primary" onclick="showWizardStep(5)">${t('Next: General Info →')}</button>
    </div>
  `);
}

// startCamera / stopCamera kept for backwards compat
// Camera is now handled by camOpen() / camClose()
async function startCamera() { /* no-op — camera now uses camOpen() fullscreen modal */ }
function stopCamera() {
  camClose();
  if (state.cameraStream) { state.cameraStream.getTracks().forEach(t => t.stop()); state.cameraStream = null; }
}

function takePhoto() { camSnap(); } // shutter still works if called

function setPhotoLabel(label) {
  state.photoLabel = label;
  document.querySelectorAll('.photo-label-btn').forEach(b => b.classList.toggle('active', b.dataset.label===label));
}

function uploadPhoto(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  // Single file → open editor for crop/rotate
  if (files.length === 1) {
    const reader = new FileReader();
    reader.onload = e => {
      camState.label  = state.photoLabel || '';
      camState.onSave = url => {
        addPhotoToReport(url, state.photoLabel);
        renderStep4(state.currentReport);
        toast(t('📸 Photo saved:') + ' ' + state.photoLabel);
      };
      editorOpen(e.target.result);
    };
    reader.readAsDataURL(files[0]);
    return;
  }
  // Multiple → add directly, no processing
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      addPhotoToReport(e.target.result, state.photoLabel);
      renderStep4(state.currentReport);
    };
    reader.onerror = () => toast(t('⚠️ Could not read photo'));
    reader.readAsDataURL(file);
  });
}

function addPhotoToReport(url, label) {
  updateReport(r => {
    if (!r.photos) r.photos = [];
    r.photos.push({ url, label, ts: Date.now() });
  });
  renderPhotoGrid();
}

function deletePhoto(idx) {
  updateReport(r => r.photos.splice(idx, 1));
  renderPhotoGrid();
}

/**
 * Opens the photo editor for an already-saved final report photo.
 * On save, replaces the photo in-place at the same index.
 * @param {number} idx - Index in r.photos array
 */
function editPhoto(idx) {
  const r = state.currentReport;
  if (!r || !r.photos[idx]) return;
  camState.label  = r.photos[idx].label || '';
  camState.onSave = url => {
    updateReport(r2 => { r2.photos[idx] = { ...r2.photos[idx], url }; });
    renderStep4(state.currentReport);
  };
  editorOpen(r.photos[idx].url);
}

function renamePhoto(index, newLabel) {
  updateReport(r => { if (r.photos[index]) r.photos[index].label = newLabel; });
}

function renderPhotoGrid() {
  const grid = qs('#photo-grid');
  if (!grid) return;
  const r = state.currentReport;
  grid.innerHTML = (r.photos||[]).map((p,i) => `
    <div class="photo-thumb">
      <img src="${p.url}" alt="${p.label}">
      <button class="pt-edit" onclick="editPhoto(${i})" title="Edit">✏</button>
      <div class="pt-label">
        <input value="${esc(p.label||'')}" style="background:transparent;border:none;color:#fff;font-size:10px;width:100%;text-align:center;outline:none;cursor:text"
          oninput="renamePhoto(${i},this.value)" onclick="event.stopPropagation()">
      </div>
      <button class="pt-del" onclick="deletePhoto(${i})">✕</button>
    </div>`).join('') || `<div style="color:var(--muted);font-size:13px;grid-column:1/-1;padding:20px;text-align:center">${t('No photos yet.')}</div>`;
}

// ══════════════════════════════════════════════════════════════════════
// STEP 5: GENERAL INFO
// ══════════════════════════════════════════════════════════════════════

/**
 * Builds <option> HTML for a people dropdown, pre-selecting the stored
 * default when no explicit value has been saved on the report.
 * @param {string} key      - People list key (e.g. "qc", "supplier")
 * @param {string} selected - Currently saved value on the report
 * @returns {string} HTML option string
 */
function peopleOpts(key, selected) {
  const list = state.people[key] || [];
  const defaults = state.peopleDefaults;
  const effective = selected || defaults[key] || '';
  const opts = [`<option value="">${t('— Select —')}</option>`];
  list.forEach(name => opts.push(`<option value="${esc(name)}" ${name===effective?'selected':''}>${name}</option>`));
  if (effective && !list.includes(effective)) opts.push(`<option value="${esc(effective)}" selected>${effective}</option>`);
  return opts.join('');
}

function renderStep5(r) {
  const yn = (name, val) => `<div style="display:flex;gap:8px">
    <button class="btn ${val==='yes'?'btn-success':'btn-ghost'} btn-sm" onclick="setYN('${name}','yes')">${t('Yes · Evet')}</button>
    <button class="btn ${val==='no'?'btn-danger':'btn-ghost'} btn-sm" onclick="setYN('${name}','no')">${t('No · Hayır')}</button>
  </div>`;
  render(`
    ${stepsHTML(5)}
    <div class="card-title" style="margin-bottom:12px">${t('General Inspection Information')}</div>
    <div class="grid-2">
      <div class="field"><label>${t('Total Boxes in Shipment')}</label><input id="f-totalboxes" type="number" value="${r.totalBoxes||''}"></div>
      <div class="field"><label>${t('Boxes Checked · Kontrol Edilen Koli')}</label><input id="f-boxeschecked" type="number" value="${r.boxesChecked||''}"></div>
    </div>
    <div class="field"><label>${t('Boxes Checked (which boxes?)')}</label><input id="f-boxescheckedlist" type="text" value="${r.boxesCheckedList||''}" placeholder=""></div>
    <div class="grid-2">
      <div class="field"><label>${t('In-Line Inspections Count')}</label><input id="f-inline" type="number" value="${(() => { const count = state.interimReports.filter(ir => ir.customer===r.customer && ir.orderno===r.orderno).length; return r.inlineInspections || count || 0; })()}"></div>
      <div class="field"><label>${t('Final Inspection No')}</label><input id="f-finaln" type="number" value="${r.finalInspectionNo||1}"></div>
    </div>

/**
 * Handles Yes/No toggle buttons on Step 5 (General Info).
 * Saves all current form values before re-rendering to prevent data loss.
 * @param {string} field - Report field name ("productionPerSample" | "sampleAvailable")
 * @param {"yes"|"no"} val - Selected value
 */
function setYN(field, val) {
  // Save all current field values before re-render so nothing is lost
  updateReport(r => {
    // Always update the toggled field
    r[field] = val;
    // Save other form values if they're currently rendered
    const getVal = id => { const el = qs('#'+id); return el ? el.value : null; };
    if (getVal('f-totalboxes') !== null) {
      r.totalBoxes       = parseInt(getVal('f-totalboxes'))||0;
      r.boxesChecked     = parseInt(getVal('f-boxeschecked'))||0;
      r.boxesCheckedList = getVal('f-boxescheckedlist')||'';
      r.inlineInspections = parseInt(getVal('f-inline'))||0;
      r.finalInspectionNo = parseInt(getVal('f-finaln'))||1;
    }
    if (getVal('f-qcname') !== null) {
      r.qcName       = getVal('f-qcname')||'';
      r.deptManager  = getVal('f-deptmgr')||'';
      r.qaManager    = getVal('f-qamgr')||'';
      r.supplierRep  = getVal('f-supprep')||'';
      r.comments     = getVal('f-comments')||'';
    }
    // Ensure both yn fields always have a value
    if (!r.productionPerSample) r.productionPerSample = 'yes';
    if (!r.sampleAvailable) r.sampleAvailable = 'yes';
  });
  renderStep5(state.currentReport);
}

function saveStep5() {
  updateReport(r => {
    if (!r.inspfinish) r.inspfinish = localNowString();
    r.totalBoxes       = parseInt(qs('#f-totalboxes').value)||0;
    r.boxesChecked     = parseInt(qs('#f-boxeschecked').value)||0;
    r.boxesCheckedList = qs('#f-boxescheckedlist').value||'';
    r.inlineInspections= parseInt(qs('#f-inline').value)||0;
    r.finalInspectionNo= parseInt(qs('#f-finaln').value)||1;
    r.qcName           = qs('#f-qcname').value;
    r.deptManager      = qs('#f-deptmgr').value;
    r.qaManager        = qs('#f-qamgr').value;
    r.supplierRep      = qs('#f-supprep').value;
    r.comments         = qs('#f-comments').value;
    r.result           = autoResult(r);
    r.status           = 'complete';
  });
  downloadFinalPDF();
}

function renderStep6(r) {
  const { maj, min } = defectTotals(r);

  const photosHTML = allPhotos.length
    ? `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">

  const defectNotesHTML = (() => {

    if (!arr.length) return `<div style="color:#999">${t('No defect notes')}</div>`;

  const reportHTML = `

          ${buildDefectRowsForCats(LEFT_CATS, r, 'preview')}

        <div style="display:flex;flex-direction:column;gap:10px">

            ${buildDefectRowsForCats(RIGHT_CATS, r, 'preview')}
          </div>
          <div style="border:1px solid #e5e7eb;border-radius:6px;padding:8px;font-size:11px;background:${result==='pass'?'#dcfce7':'#fee2e2'};border-color:${result==='pass'?'#86efac':'#fca5a5'}">

// ── Photo + defect-notes pages builder for Final Control PDF ──────────
// Called as a plain function (NOT inside a template literal) so all JS
// logic (loops, conditionals) executes correctly at runtime.
function _buildFinalPhotoAndNotesPages(r) {
  const allPhotos = r.photos || [];
  const hasNotes = Object.values(r.defects||{}).some(function(d) {
    var dp = d.photos || (d.photo ? [d.photo] : []);
    return d.note || dp.length;
  });
  if (!allPhotos.length && !hasNotes) return '';

  // ── Photo pages: 2 cols × 3 rows = 6 per page ──
  var PER_PAGE = 6;
  var photoPages = '';
  for (var start = 0; start < allPhotos.length; start += PER_PAGE) {
    var chunk = allPhotos.slice(start, start + PER_PAGE);
    var header = start === 0
      ? '<div class="section-bar" style="margin-bottom:8px">PHOTOS · Fotoğraflar (' + allPhotos.length + ')</div>'
      : '';
    var cells = chunk.map(function(p) {
      var label = p.label
        ? '<div style="font-size:9px;font-weight:700;color:#374151;text-align:center;padding:3px 4px;background:#f0f0f0;border-top:1px solid #ddd;width:100%">' + p.label + '</div>'
        : '';
      return '<div style="border:1px solid #ccc;border-radius:6px;overflow:hidden;background:#f9f9f9;display:flex;flex-direction:column;break-inside:avoid;page-break-inside:avoid">'
        + '<div style="width:100%;height:240px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#f9f9f9">'
        + '<img src="' + p.url + '" style="max-width:100%;max-height:240px;width:auto;height:auto;display:block;object-fit:contain">'
        + '</div>' + label + '</div>';
    }).join('');
    photoPages += '<div class="pdf-page" style="break-inside:avoid;page-break-inside:avoid">' + header
      + '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:4px">'
      + cells + '</div></div>';
  }

  // ── Defect notes page ──
  var notesCards = '';
  DEFECT_CATEGORIES.forEach(function(cat) {
    cat.items.forEach(function(item) {
      var d = r.defects[item.code];
      if (!d) return;
      var dp = d.photos || (d.photo ? [d.photo] : []);
      if (!d.note && !dp.length) return;
      var photoGrid = dp.length
        ? '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:4px">'
          + dp.map(function(src) {
            return '<img src="' + src + '" style="width:100%;height:180px;object-fit:cover;display:block">';
          }).join('') + '</div>'
        : '';
      var noteHTML = d.note
        ? '<div style="margin-top:4px;font-style:italic;color:#374151">' + d.note + '</div>'
        : '';
      notesCards += '<div style="border:1px solid #ccc;border-radius:6px;overflow:hidden;break-inside:avoid;page-break-inside:avoid">'
        + photoGrid
        + '<div style="padding:6px 8px;font-size:8px">'
        + '<div style="font-weight:700;font-family:monospace;color:#A6A6A6">' + item.code + '</div>'
        + '<div style="margin-top:2px;color:#374151;font-size:8px">' + item.en + ' / <span style="color:#888">' + item.tr + '</span></div>'
        + noteHTML + '</div></div>';
    });
  });
  var notesPage = notesCards
    ? '<div class="pdf-page"><div class="section-bar">DEFECT NOTES · Hata Notları</div>'
      + '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px">'
      + notesCards + '</div></div>'
    : '';

  return photoPages + notesPage;
}

async function uploadPendingPhotos(report) {
  let changed = false;
  const photos = (report.photos || []).slice();
  for (let i = 0; i < photos.length; i++) {
    const p = photos[i];
    if (p && p.url && p.url.startsWith('data:')) {
      try {
        photos[i] = { ...p, url: await sb.uploadPhoto(report.id, p.url) };
        changed = true;
      } catch (e) { console.warn('[AQL] Photo upload failed:', e.message); }
    }
  }
  if (changed) report.photos = photos;

  const defects = { ...(report.defects || {}) };
  for (const code of Object.keys(defects)) {
    const d = { ...defects[code] };
    const dp = (d.photos || []).slice();
    let dChanged = false;
    for (let i = 0; i < dp.length; i++) {
      if (typeof dp[i] === 'string' && dp[i].startsWith('data:')) {
        try {
          dp[i] = await sb.uploadPhoto(report.id, dp[i]);
          dChanged = true;
        } catch (e) { console.warn('[AQL] Defect photo upload failed:', e.message); }
      }
    }
    if (dChanged) { defects[code] = { ...d, photos: dp }; changed = true; }
  }
  if (changed) report.defects = defects;
  return changed;
}

async function loadInterimReportsFromSupabase() {
  try {
    const rows = await sb.rest('GET', 'interim_reports', null, { select: '*', order: 'created_at.asc' });
    if (rows && rows.length) {
      const fromSupabase = rows.map(rowToInterim);
      const fromLocal    = loadInterimReports();
      // Merge: Supabase is source of truth, add any local-only records
      const merged = [...fromSupabase];
      fromLocal.forEach(lr => { if (!merged.find(sr => sr.id === lr.id)) merged.push(lr); });
      state.interimReports = merged;
      localStorage.setItem(INTERIM_KEY, JSON.stringify(merged));
      return;
    }
  } catch(e) { console.warn('[AQL] Interim load failed:', e.message); }
}

      const fromSupabase = { qc: [], dept: [], qa: [], supplier: [] };
      rows.forEach(r => { if (fromSupabase[r.role]) fromSupabase[r.role].push(r.name); });
      const fromLocal = loadPeople();
      const merged = { qc: [], dept: [], qa: [], supplier: [] };
      for (const key of Object.keys(merged)) {
        const combined = [...new Set([...(fromSupabase[key]||[]), ...(fromLocal[key]||[])])];
        merged[key] = combined;
      }
      localStorage.setItem(PEOPLE_KEY, JSON.stringify(merged));
      state.people = merged;
      return merged;
    }
  } catch (e) { console.warn('[AQL] People load failed:', e.message); }
  return loadPeople();
}

async function loadCustomersFromSupabase() {
  try {
    const rows = await sb.rest('GET', 'customers', null, { select: 'name', order: 'name.asc' });
    if (rows && rows.length) {
      // Merge: combine Supabase + localStorage, deduplicate, sort
      const fromSupabase = rows.map(r => r.name);
      const fromLocal = loadCustomers();
      const merged = [...new Set([...fromSupabase, ...fromLocal])].sort();
      localStorage.setItem(CUSTOMERS_KEY, JSON.stringify(merged));
      state.customers = merged;
      return merged;
    }
    // Supabase returned empty — trust localStorage completely
  } catch (e) { console.warn('[AQL] Customers load failed:', e.message); }
  return loadCustomers();
}

(async function aqlSupabaseInit() {

  await loadInterimReportsFromSupabase();
  await loadChecklistsFromSupabase();
  await loadPeopleFromSupabase();
